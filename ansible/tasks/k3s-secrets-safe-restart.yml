---
- name: Ensure Secrets-encryption operation directory exists
  ansible.builtin.file:
    path: "{{ k3s_secrets_operation_root }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Read Secrets-encryption restart marker
  ansible.builtin.stat:
    path: "{{ k3s_secrets_operation_root }}/restart-{{ k3s_secrets_restart_phase }}.complete"
  register: k3s_secrets_restart_marker

- name: Read existing Secrets-encryption restart marker content
  ansible.builtin.slurp:
    src: "{{ k3s_secrets_operation_root }}/restart-{{ k3s_secrets_restart_phase }}.complete"
  register: k3s_secrets_restart_marker_content
  when: k3s_secrets_restart_marker.stat.exists

- name: Reject a malformed Secrets-encryption restart marker
  ansible.builtin.assert:
    that:
      - >-
        ('version=v1.35.6+k3s1 phase=' ~ k3s_secrets_restart_phase) in
        (k3s_secrets_restart_marker_content.content | b64decode)
    fail_msg: >-
      Refusing malformed restart marker for {{ inventory_hostname }} phase
      {{ k3s_secrets_restart_phase }}.
  when: k3s_secrets_restart_marker.stat.exists

- name: Read local Secrets-encryption status before restart decision
  ansible.builtin.command:
    argv: [k3s, secrets-encrypt, status, --output, json]
  changed_when: false
  register: k3s_secrets_restart_status_before

- name: Check persisted Secrets-encryption flag
  ansible.builtin.command:
    argv:
      - grep
      - -Fx
      - 'secrets-encryption: true'
      - /etc/rancher/k3s/config.yaml
  changed_when: false
  failed_when: false
  register: k3s_secrets_restart_flag_before

- name: Decide whether this resumable restart is already complete
  ansible.builtin.set_fact:
    k3s_secrets_restart_already_complete: >-
      {{
        k3s_secrets_restart_marker.stat.exists and
        k3s_secrets_restart_flag_before.rc == 0 and
        (
          (
            k3s_secrets_restart_phase == 'start' and
            (k3s_secrets_restart_status_before.stdout | from_json).get('enable') is not none and
            (k3s_secrets_restart_status_before.stdout | from_json).get('stage') in
            ['start', 'reencrypt_request', 'reencrypt_active', 'reencrypt_finished']
          ) or
          (
            k3s_secrets_restart_phase == 'reencrypt-finished' and
            (k3s_secrets_restart_status_before.stdout | from_json).get('enable') == true and
            (k3s_secrets_restart_status_before.stdout | from_json).get('stage') == 'reencrypt_finished'
          )
        )
      }}

- name: Report completed resumable Secrets-encryption restart
  ansible.builtin.debug:
    msg: >-
      {{ inventory_hostname }} already completed the
      {{ k3s_secrets_restart_phase }} Secrets-encryption restart; mutation skipped.
  when: k3s_secrets_restart_already_complete | bool

- name: Restart K3s server with drain and OpenClaw protection
  when: not (k3s_secrets_restart_already_complete | bool)
  block:
    - name: Initialise safe-restart rescue state
      ansible.builtin.set_fact:
        k3s_secrets_restart_cordoned: false
        k3s_secrets_restart_attempted: false

    - name: Require local API and etcd readiness on every server
      ansible.builtin.command:
        argv:
          - k3s
          - kubectl
          - get
          - --raw=/readyz?verbose
      delegate_to: "{{ item }}"
      become: true
      loop: "{{ groups['k3s_servers'] }}"
      loop_control:
        label: "{{ item }}"
      changed_when: false
      register: k3s_secrets_all_servers_readyz
      failed_when: >-
        k3s_secrets_all_servers_readyz.rc != 0 or
        '[+]etcd ok' not in k3s_secrets_all_servers_readyz.stdout or
        '[+]etcd-readiness ok' not in k3s_secrets_all_servers_readyz.stdout or
        'readyz check passed' not in k3s_secrets_all_servers_readyz.stdout

    - name: Require protected OpenClaw singletons off restart target
      ansible.builtin.command:
        argv:
          - "{{ playbook_dir }}/../../scripts/openclaw_failover_gate.sh"
          - pre
          - --state-file
          - >-
            {{ playbook_dir }}/../../.tools/openclaw-secrets-{{
            k3s_secrets_restart_phase }}-{{ inventory_hostname }}.json
          - --target-node
          - "{{ inventory_hostname }}"
          - --require-off-target
      environment:
        KUBECTL_BIN: "{{ k3s_upgrade_kubectl }}"
        EXPECTED_KUBE_CONTEXT: "{{ k3s_upgrade_expected_context }}"
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Cordon Secrets-encryption restart target
      ansible.builtin.command:
        argv: ["{{ k3s_upgrade_kubectl }}", cordon, "{{ inventory_hostname }}"]
      delegate_to: localhost
      become: false
      register: k3s_secrets_restart_cordon_result
      changed_when: "'already cordoned' not in k3s_secrets_restart_cordon_result.stdout"

    - name: Mark Secrets-encryption restart target as cordoned
      ansible.builtin.set_fact:
        k3s_secrets_restart_cordoned: true

    - name: Server-side dry-run after controllers observe restart cordon
      ansible.builtin.command:
        argv:
          - "{{ k3s_upgrade_kubectl }}"
          - drain
          - "{{ inventory_hostname }}"
          - --dry-run=server
          - --ignore-daemonsets
          - --delete-emptydir-data
          - "--timeout={{ k3s_upgrade_drain_timeout }}"
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Drain Secrets-encryption restart target without PDB bypass
      ansible.builtin.command:
        argv:
          - "{{ k3s_upgrade_kubectl }}"
          - drain
          - "{{ inventory_hostname }}"
          - --ignore-daemonsets
          - --delete-emptydir-data
          - "--timeout={{ k3s_upgrade_drain_timeout }}"
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Recheck both surviving API and etcd peers before server restart
      ansible.builtin.command:
        argv:
          - k3s
          - kubectl
          - get
          - --raw=/readyz?verbose
      delegate_to: "{{ item }}"
      become: true
      loop: "{{ groups['k3s_servers'] | difference([inventory_hostname]) }}"
      loop_control:
        label: "{{ item }}"
      changed_when: false
      register: k3s_secrets_surviving_servers_readyz
      failed_when: >-
        k3s_secrets_surviving_servers_readyz.rc != 0 or
        '[+]etcd ok' not in k3s_secrets_surviving_servers_readyz.stdout or
        '[+]etcd-readiness ok' not in k3s_secrets_surviving_servers_readyz.stdout or
        'readyz check passed' not in k3s_secrets_surviving_servers_readyz.stdout

    - name: Persist Secrets-encryption flag before start-stage restart
      ansible.builtin.lineinfile:
        path: /etc/rancher/k3s/config.yaml
        regexp: '^secrets-encryption:'
        line: 'secrets-encryption: true'
        insertafter: '^write-kubeconfig-mode:'
        backup: true
        owner: root
        group: root
        mode: "0600"
      when: k3s_secrets_restart_apply_flag | bool

    - name: Mark K3s restart as attempted for conservative rescue
      ansible.builtin.set_fact:
        k3s_secrets_restart_attempted: true

    - name: Restart K3s server serially
      ansible.builtin.systemd:
        name: k3s
        state: restarted

    - name: Wait for local API after Secrets-encryption restart
      ansible.builtin.command:
        argv: [k3s, kubectl, get, --raw=/readyz]
      changed_when: false
      register: k3s_secrets_restart_local_ready
      retries: 30
      delay: 10
      until: k3s_secrets_restart_local_ready.rc == 0

    - name: Wait for restarted node to report Ready
      ansible.builtin.command:
        argv:
          - "{{ k3s_upgrade_kubectl }}"
          - wait
          - "node/{{ inventory_hostname }}"
          - --for=condition=Ready
          - --timeout=5m
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Verify local Secrets-encryption state after restart
      ansible.builtin.command:
        argv: [k3s, secrets-encrypt, status, --output, json]
      changed_when: false
      register: k3s_secrets_restart_status_after
      retries: 30
      delay: 10
      until: >-
        (
          (
            k3s_secrets_restart_phase == 'start' and
            (
              (
                (k3s_secrets_restart_status_after.stdout | from_json).get('enable') == false and
                (k3s_secrets_restart_status_after.stdout | from_json).get('stage') == 'start'
              ) or
              (
                (k3s_secrets_restart_status_after.stdout | from_json).get('enable') == true and
                (k3s_secrets_restart_status_after.stdout | from_json).get('stage') == 'reencrypt_finished'
              )
            )
          ) or
          (
            k3s_secrets_restart_phase == 'reencrypt-finished' and
            (k3s_secrets_restart_status_after.stdout | from_json).get('enable') == true and
            (k3s_secrets_restart_status_after.stdout | from_json).get('stage') == 'reencrypt_finished'
          )
        )

    - name: Wait for infrastructure gates after Secrets-encryption restart
      ansible.builtin.command:
        argv:
          - "{{ playbook_dir }}/../../scripts/k3s_upgrade_gate.sh"
          - post-node
          - --expected-versions
          - v1.35.6+k3s1
          - --target-node
          - "{{ inventory_hostname }}"
      environment:
        KUBECTL_BIN: "{{ k3s_upgrade_kubectl }}"
        EXPECTED_KUBE_CONTEXT: "{{ k3s_upgrade_expected_context }}"
      delegate_to: localhost
      become: false
      changed_when: false
      register: k3s_secrets_restart_infrastructure_gate
      retries: 60
      delay: 10
      until: k3s_secrets_restart_infrastructure_gate.rc == 0

    - name: Wait for OpenClaw gate after Secrets-encryption restart
      ansible.builtin.command:
        argv:
          - "{{ playbook_dir }}/../../scripts/openclaw_failover_gate.sh"
          - post
          - --state-file
          - >-
            {{ playbook_dir }}/../../.tools/openclaw-secrets-{{
            k3s_secrets_restart_phase }}-{{ inventory_hostname }}.json
          - --target-node
          - "{{ inventory_hostname }}"
      environment:
        KUBECTL_BIN: "{{ k3s_upgrade_kubectl }}"
        EXPECTED_KUBE_CONTEXT: "{{ k3s_upgrade_expected_context }}"
      delegate_to: localhost
      become: false
      changed_when: false
      register: k3s_secrets_restart_openclaw_gate
      retries: 90
      delay: 10
      until: k3s_secrets_restart_openclaw_gate.rc == 0

    - name: Uncordon healthy Secrets-encryption restart target
      ansible.builtin.command:
        argv: ["{{ k3s_upgrade_kubectl }}", uncordon, "{{ inventory_hostname }}"]
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Clear Secrets-encryption cordon rescue state
      ansible.builtin.set_fact:
        k3s_secrets_restart_cordoned: false

    - name: Persist resumable Secrets-encryption restart marker
      ansible.builtin.copy:
        dest: "{{ k3s_secrets_operation_root }}/restart-{{ k3s_secrets_restart_phase }}.complete"
        content: >-
          version=v1.35.6+k3s1 phase={{ k3s_secrets_restart_phase }}
          completed={{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}
        owner: root
        group: root
        mode: "0600"

  rescue:
    - name: Uncordon restart target when failure happened before restart
      ansible.builtin.command:
        argv: ["{{ k3s_upgrade_kubectl }}", uncordon, "{{ inventory_hostname }}"]
      delegate_to: localhost
      become: false
      failed_when: false
      changed_when: true
      when:
        - k3s_secrets_restart_cordoned | default(false) | bool
        - not (k3s_secrets_restart_attempted | default(false) | bool)

    - name: Stop Secrets-encryption operation after safe-restart failure
      ansible.builtin.fail:
        msg: >-
          Secrets-encryption {{ k3s_secrets_restart_phase }} restart failed on
          {{ inventory_hostname }}.
          {{
            'The node remains cordoned for diagnosis.'
            if k3s_secrets_restart_cordoned | default(false) | bool
            else 'The node is uncordoned, but no completion marker was trusted.'
          }}
          Never bypass PDBs or repeat encryption stages manually.
