---
# Apply Longhorn prerequisites to every node that can host a Longhorn volume.
# Sauvage is attach-only: it needs iSCSI and dm-crypt, but replica scheduling is
# disabled separately by enable-sauvage-longhorn-attach-only.yml.
# Idempotent — safe to re-run. Run with:
#   ansible-playbook -i ansible/inventory/generated/ks5.ini ansible/playbooks/longhorn-prereqs.yml
- name: Longhorn prerequisites — KS-5-A control-plane storage nodes
  hosts: ks5_control_plane
  become: true
  gather_facts: true
  roles:
    - longhorn_prereqs

- name: Longhorn prerequisites — x86 control-plane (local execution)
  hosts: ubuntu
  connection: local
  become: true
  gather_facts: true
  roles:
    - longhorn_prereqs

- name: Longhorn prerequisites — Sauvage attach-only worker
  hosts: sauvage
  become: true
  gather_facts: true
  roles:
    - longhorn_prereqs
