---
- name: Gate secrets-at-rest enablement after the final supported K3s baseline
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vars/k3s-upgrade.yml
  tasks:
    - name: Require explicit production confirmation
      ansible.builtin.assert:
        that:
          - lookup('env', 'CONFIRM_K3S_SECRETS_ENCRYPTION') == 'enable-after-v1.35.6-healthy'
        fail_msg: "Set CONFIRM_K3S_SECRETS_ENCRYPTION=enable-after-v1.35.6-healthy"

    - name: Require fully healthy final cluster before encryption work
      ansible.builtin.command:
        argv:
          - "{{ playbook_dir }}/../../scripts/k3s_upgrade_gate.sh"
          - final
          - --expected-versions
          - v1.35.6+k3s1
      environment:
        KUBECTL_BIN: "{{ k3s_upgrade_kubectl }}"
        EXPECTED_KUBE_CONTEXT: "{{ k3s_upgrade_expected_context }}"
      changed_when: false

- name: Verify disabled state and snapshot etcd
  hosts: k3s_servers
  order: inventory
  serial: 1
  become: true
  gather_facts: false
  vars_files:
    - ../vars/k3s-upgrade.yml
  tasks:
    - name: Read current encryption status on every server
      ansible.builtin.command:
        argv: [k3s, secrets-encrypt, status]
      changed_when: false
      register: k3s_secrets_status_disabled
      failed_when: "'Encryption Status: Disabled' not in k3s_secrets_status_disabled.stdout"

    - name: Allocate pre-encryption snapshot name on S1
      ansible.builtin.set_fact:
        k3s_secrets_snapshot_name: >-
          pre-k3s-secrets-encryption-{{ lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ') }}
      when: inventory_hostname == groups['k3s_servers'][0]

    - name: Create local and S3 pre-encryption snapshot on S1
      ansible.builtin.command:
        argv:
          - k3s
          - etcd-snapshot
          - save
          - "--name={{ k3s_secrets_snapshot_name }}"
          - --s3
          - --s3-config-secret=etcd-s3-config
      changed_when: true
      when: inventory_hostname == groups['k3s_servers'][0]

    - name: Verify pre-encryption snapshot exists in S3
      ansible.builtin.command:
        argv: [k3s, etcd-snapshot, list, --s3, --s3-config-secret=etcd-s3-config]
      changed_when: false
      register: k3s_secrets_snapshot_list
      failed_when: k3s_secrets_snapshot_name not in k3s_secrets_snapshot_list.stdout
      when: inventory_hostname == groups['k3s_servers'][0]

- name: Initialise encryption configuration on S1
  hosts: k3s_servers[0]
  become: true
  gather_facts: false
  tasks:
    - name: Enable secrets encryption configuration
      ansible.builtin.command:
        argv: [k3s, secrets-encrypt, enable]
      changed_when: true

- name: Add encryption flag and restart servers serially
  hosts: k3s_servers
  order: inventory
  serial: 1
  any_errors_fatal: true
  become: true
  gather_facts: false
  vars_files:
    - ../vars/k3s-upgrade.yml
  tasks:
    - name: Persist secrets-encryption in K3s config
      ansible.builtin.lineinfile:
        path: /etc/rancher/k3s/config.yaml
        regexp: '^secrets-encryption:'
        line: 'secrets-encryption: true'
        insertafter: '^write-kubeconfig-mode:'
        backup: true
        owner: root
        group: root
        mode: "0600"

    - name: Restart K3s server serially
      ansible.builtin.systemd:
        name: k3s
        state: restarted

    - name: Wait for local API
      ansible.builtin.command:
        argv: [k3s, kubectl, get, --raw=/readyz]
      changed_when: false
      register: k3s_secrets_local_ready
      retries: 30
      delay: 10
      until: k3s_secrets_local_ready.rc == 0

    - name: Wait for node Ready after config restart
      ansible.builtin.command:
        argv:
          - "{{ k3s_upgrade_kubectl }}"
          - wait
          - "node/{{ inventory_hostname }}"
          - --for=condition=Ready
          - --timeout=5m
      delegate_to: localhost
      become: false
      changed_when: false

- name: Verify start stage and rotate keys on S1
  hosts: k3s_servers[0]
  become: true
  gather_facts: false
  tasks:
    - name: Require start stage and matching server hashes
      ansible.builtin.command:
        argv: [k3s, secrets-encrypt, status]
      changed_when: false
      register: k3s_secrets_start_status
      failed_when: >-
        'Encryption Status: Disabled' not in k3s_secrets_start_status.stdout or
        'Current Rotation Stage: start' not in k3s_secrets_start_status.stdout or
        'Server Encryption Hashes: All hashes match' not in k3s_secrets_start_status.stdout

    - name: Rotate keys and request re-encryption
      ansible.builtin.command:
        argv: [k3s, secrets-encrypt, rotate-keys]
      changed_when: true

    - name: Wait for all Secrets to be re-encrypted
      ansible.builtin.command:
        argv: [k3s, secrets-encrypt, status]
      changed_when: false
      register: k3s_secrets_reencrypt_status
      retries: 180
      delay: 10
      until:
        - "'Encryption Status: Enabled' in k3s_secrets_reencrypt_status.stdout"
        - "'Current Rotation Stage: reencrypt_finished' in k3s_secrets_reencrypt_status.stdout"

- name: Synchronise rotated encryption config across all servers
  hosts: k3s_servers
  order: inventory
  serial: 1
  any_errors_fatal: true
  become: true
  gather_facts: false
  vars_files:
    - ../vars/k3s-upgrade.yml
  tasks:
    - name: Restart K3s server serially after rotation
      ansible.builtin.systemd:
        name: k3s
        state: restarted

    - name: Wait for local API after rotation
      ansible.builtin.command:
        argv: [k3s, kubectl, get, --raw=/readyz]
      changed_when: false
      register: k3s_secrets_rotated_ready
      retries: 30
      delay: 10
      until: k3s_secrets_rotated_ready.rc == 0

    - name: Verify encrypted final state on every server
      ansible.builtin.command:
        argv: [k3s, secrets-encrypt, status]
      changed_when: false
      register: k3s_secrets_final_status
      failed_when: >-
        'Encryption Status: Enabled' not in k3s_secrets_final_status.stdout or
        'Current Rotation Stage: reencrypt_finished' not in k3s_secrets_final_status.stdout

- name: Verify final matching hashes and snapshot encrypted etcd
  hosts: k3s_servers[0]
  become: true
  gather_facts: false
  tasks:
    - name: Require all server encryption hashes to match
      ansible.builtin.command:
        argv: [k3s, secrets-encrypt, status]
      changed_when: false
      register: k3s_secrets_matching_hashes
      failed_when: >-
        'Encryption Status: Enabled' not in k3s_secrets_matching_hashes.stdout or
        'Current Rotation Stage: reencrypt_finished' not in k3s_secrets_matching_hashes.stdout or
        'Server Encryption Hashes: All hashes match' not in k3s_secrets_matching_hashes.stdout

    - name: Allocate encrypted snapshot name
      ansible.builtin.set_fact:
        k3s_secrets_encrypted_snapshot_name: >-
          post-k3s-secrets-encryption-{{ lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ') }}

    - name: Snapshot encrypted etcd locally and to S3
      ansible.builtin.command:
        argv:
          - k3s
          - etcd-snapshot
          - save
          - "--name={{ k3s_secrets_encrypted_snapshot_name }}"
          - --s3
          - --s3-config-secret=etcd-s3-config
      changed_when: true

    - name: Verify encrypted snapshot exists in S3
      ansible.builtin.command:
        argv: [k3s, etcd-snapshot, list, --s3, --s3-config-secret=etcd-s3-config]
      changed_when: false
      register: k3s_secrets_encrypted_snapshot_list
      failed_when: k3s_secrets_encrypted_snapshot_name not in k3s_secrets_encrypted_snapshot_list.stdout

- name: Final cluster gates after secrets-at-rest enablement
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vars/k3s-upgrade.yml
  tasks:
    - name: Require healthy cluster after encryption
      ansible.builtin.command:
        argv:
          - "{{ playbook_dir }}/../../scripts/k3s_upgrade_gate.sh"
          - final
          - --expected-versions
          - v1.35.6+k3s1
      environment:
        KUBECTL_BIN: "{{ k3s_upgrade_kubectl }}"
        EXPECTED_KUBE_CONTEXT: "{{ k3s_upgrade_expected_context }}"
      changed_when: false
