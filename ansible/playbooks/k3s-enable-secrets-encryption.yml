---
- name: Gate secrets-at-rest enablement after the final supported K3s baseline
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vars/k3s-upgrade.yml
  tasks:
    - name: Require explicit production confirmation
      ansible.builtin.assert:
        that:
          - lookup('env', 'CONFIRM_K3S_SECRETS_ENCRYPTION') == 'enable-after-v1.35.6-healthy'
        fail_msg: "Set CONFIRM_K3S_SECRETS_ENCRYPTION=enable-after-v1.35.6-healthy"

    - name: Require fully healthy final cluster before encryption work
      ansible.builtin.command:
        argv:
          - "{{ playbook_dir }}/../../scripts/k3s_upgrade_gate.sh"
          - final
          - --expected-versions
          - v1.35.6+k3s1
      environment:
        KUBECTL_BIN: "{{ k3s_upgrade_kubectl }}"
        EXPECTED_KUBE_CONTEXT: "{{ k3s_upgrade_expected_context }}"
      changed_when: false

- name: Verify initial or resumable state and snapshot etcd
  hosts: k3s_servers
  order: inventory
  serial: 1
  become: true
  gather_facts: false
  vars_files:
    - ../vars/k3s-upgrade.yml
  tasks:
    - name: Read resumable encryption status on every server
      ansible.builtin.command:
        argv: [k3s, secrets-encrypt, status, --output, json]
      changed_when: false
      register: k3s_secrets_status_current

    - name: Reject an unknown encryption state
      ansible.builtin.assert:
        that:
          - >-
            (k3s_secrets_status_current.stdout | from_json).get('enable') is none or
            (
              (k3s_secrets_status_current.stdout | from_json).get('enable') == false and
              (k3s_secrets_status_current.stdout | from_json).get('stage') == 'start'
            ) or
            (
              (k3s_secrets_status_current.stdout | from_json).get('enable') == true and
              (k3s_secrets_status_current.stdout | from_json).get('stage') in
              ['reencrypt_request', 'reencrypt_active', 'reencrypt_finished']
            )
        fail_msg: >-
          Refusing to resume from an unknown Secrets-encryption state on
          {{ inventory_hostname }}: {{ k3s_secrets_status_current.stdout }}

    - name: Ensure Secrets-encryption operation directory exists on S1
      ansible.builtin.file:
        path: "{{ k3s_secrets_operation_root }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      when: inventory_hostname == groups['k3s_servers'][0]

    - name: Read pre-encryption snapshot marker on S1
      ansible.builtin.stat:
        path: "{{ k3s_secrets_operation_root }}/pre-snapshot.name"
      register: k3s_secrets_pre_snapshot_marker
      when: inventory_hostname == groups['k3s_servers'][0]

    - name: Read existing pre-encryption snapshot name on S1
      ansible.builtin.slurp:
        src: "{{ k3s_secrets_operation_root }}/pre-snapshot.name"
      register: k3s_secrets_pre_snapshot_marker_content
      when:
        - inventory_hostname == groups['k3s_servers'][0]
        - k3s_secrets_pre_snapshot_marker.stat.exists | default(false)

    - name: Select resumable pre-encryption snapshot name on S1
      ansible.builtin.set_fact:
        k3s_secrets_snapshot_name: >-
          {{
            (k3s_secrets_pre_snapshot_marker_content.content | b64decode | trim)
            if k3s_secrets_pre_snapshot_marker.stat.exists
            else 'pre-k3s-secrets-encryption-' ~ lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ')
          }}
      when: inventory_hostname == groups['k3s_servers'][0]

    - name: Validate resumable pre-encryption snapshot name on S1
      ansible.builtin.assert:
        that:
          - k3s_secrets_snapshot_name is match('^pre-k3s-secrets-encryption-[0-9]{8}T[0-9]{6}Z$')
      when: inventory_hostname == groups['k3s_servers'][0]

    - name: Create local and S3 pre-encryption snapshot on S1
      ansible.builtin.command:
        argv:
          - k3s
          - etcd-snapshot
          - save
          - "--name={{ k3s_secrets_snapshot_name }}"
          - --s3
          - --s3-config-secret=etcd-s3-config
      changed_when: true
      when:
        - inventory_hostname == groups['k3s_servers'][0]
        - not (k3s_secrets_pre_snapshot_marker.stat.exists | default(false))

    - name: Verify pre-encryption snapshot exists in S3
      ansible.builtin.command:
        argv: [k3s, etcd-snapshot, list, --s3, --s3-config-secret=etcd-s3-config]
      changed_when: false
      register: k3s_secrets_snapshot_list
      failed_when: k3s_secrets_snapshot_name not in k3s_secrets_snapshot_list.stdout
      when: inventory_hostname == groups['k3s_servers'][0]

    - name: Persist verified pre-encryption snapshot marker on S1
      ansible.builtin.copy:
        dest: "{{ k3s_secrets_operation_root }}/pre-snapshot.name"
        content: "{{ k3s_secrets_snapshot_name }}\n"
        owner: root
        group: root
        mode: "0600"
      when:
        - inventory_hostname == groups['k3s_servers'][0]
        - not (k3s_secrets_pre_snapshot_marker.stat.exists | default(false))

- name: Initialise encryption configuration on S1
  hosts: k3s_servers[0]
  become: true
  gather_facts: false
  tasks:
    - name: Read encryption state before idempotent enable
      ansible.builtin.command:
        argv: [k3s, secrets-encrypt, status, --output, json]
      changed_when: false
      register: k3s_secrets_enable_status

    - name: Enable Secrets encryption configuration only when absent
      ansible.builtin.command:
        argv: [k3s, secrets-encrypt, enable]
      changed_when: true
      when: (k3s_secrets_enable_status.stdout | from_json).get('enable') is none

- name: Add encryption flag and safely restart servers serially
  hosts: k3s_servers
  order: inventory
  serial: 1
  any_errors_fatal: true
  become: true
  gather_facts: false
  vars_files:
    - ../vars/k3s-upgrade.yml
  vars:
    k3s_secrets_restart_phase: start
    k3s_secrets_restart_apply_flag: true
  tasks:
    - name: Safely restart server into Secrets-encryption start stage
      ansible.builtin.include_tasks: ../tasks/k3s-secrets-safe-restart.yml

- name: Verify start stage and rotate keys on S1
  hosts: k3s_servers[0]
  become: true
  gather_facts: false
  vars_files:
    - ../vars/k3s-upgrade.yml
  tasks:
    - name: Wait for a resumable key-rotation decision state
      ansible.builtin.command:
        argv: [k3s, secrets-encrypt, status, --output, json]
      changed_when: false
      register: k3s_secrets_rotation_decision
      retries: 180
      delay: 10
      until: >-
        (k3s_secrets_rotation_decision.stdout | from_json).get('stage') in
        ['start', 'reencrypt_finished']

    - name: Validate resumable key-rotation decision state
      ansible.builtin.assert:
        that:
          - >-
            (
              (k3s_secrets_rotation_decision.stdout | from_json).get('enable') == false and
              (k3s_secrets_rotation_decision.stdout | from_json).get('stage') == 'start' and
              (k3s_secrets_rotation_decision.stdout | from_json).get('hashmatch') == true
            ) or
            (
              (k3s_secrets_rotation_decision.stdout | from_json).get('enable') == true and
              (k3s_secrets_rotation_decision.stdout | from_json).get('stage') == 'reencrypt_finished'
            )
        fail_msg: >-
          Refusing to rotate or resume from state:
          {{ k3s_secrets_rotation_decision.stdout }}

    - name: Rotate keys and request re-encryption
      ansible.builtin.command:
        argv: [k3s, secrets-encrypt, rotate-keys]
      changed_when: true
      when: (k3s_secrets_rotation_decision.stdout | from_json).get('stage') == 'start'

    - name: Wait for all Secrets to be re-encrypted
      ansible.builtin.command:
        argv: [k3s, secrets-encrypt, status, --output, json]
      changed_when: false
      register: k3s_secrets_reencrypt_status
      retries: 180
      delay: 10
      until:
        - (k3s_secrets_reencrypt_status.stdout | from_json).get('enable') == true
        - (k3s_secrets_reencrypt_status.stdout | from_json).get('stage') == 'reencrypt_finished'

- name: Synchronise rotated encryption config across all servers
  hosts: k3s_servers
  order: inventory
  serial: 1
  any_errors_fatal: true
  become: true
  gather_facts: false
  vars_files:
    - ../vars/k3s-upgrade.yml
  vars:
    k3s_secrets_restart_phase: reencrypt-finished
    k3s_secrets_restart_apply_flag: false
  tasks:
    - name: Safely restart server with rotated encryption configuration
      ansible.builtin.include_tasks: ../tasks/k3s-secrets-safe-restart.yml

- name: Verify final matching hashes and snapshot encrypted etcd
  hosts: k3s_servers[0]
  become: true
  gather_facts: false
  vars_files:
    - ../vars/k3s-upgrade.yml
  tasks:
    - name: Require all server encryption hashes to match
      ansible.builtin.command:
        argv: [k3s, secrets-encrypt, status]
      changed_when: false
      register: k3s_secrets_matching_hashes
      failed_when: >-
        'Encryption Status: Enabled' not in k3s_secrets_matching_hashes.stdout or
        'Current Rotation Stage: reencrypt_finished' not in k3s_secrets_matching_hashes.stdout or
        'Server Encryption Hashes: All hashes match' not in k3s_secrets_matching_hashes.stdout

    - name: Read encrypted snapshot marker
      ansible.builtin.stat:
        path: "{{ k3s_secrets_operation_root }}/post-snapshot.name"
      register: k3s_secrets_post_snapshot_marker

    - name: Read existing encrypted snapshot name
      ansible.builtin.slurp:
        src: "{{ k3s_secrets_operation_root }}/post-snapshot.name"
      register: k3s_secrets_post_snapshot_marker_content
      when: k3s_secrets_post_snapshot_marker.stat.exists

    - name: Select resumable encrypted snapshot name
      ansible.builtin.set_fact:
        k3s_secrets_encrypted_snapshot_name: >-
          {{
            (k3s_secrets_post_snapshot_marker_content.content | b64decode | trim)
            if k3s_secrets_post_snapshot_marker.stat.exists
            else 'post-k3s-secrets-encryption-' ~ lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ')
          }}

    - name: Validate resumable encrypted snapshot name
      ansible.builtin.assert:
        that:
          - k3s_secrets_encrypted_snapshot_name is match('^post-k3s-secrets-encryption-[0-9]{8}T[0-9]{6}Z$')

    - name: Snapshot encrypted etcd locally and to S3
      ansible.builtin.command:
        argv:
          - k3s
          - etcd-snapshot
          - save
          - "--name={{ k3s_secrets_encrypted_snapshot_name }}"
          - --s3
          - --s3-config-secret=etcd-s3-config
      changed_when: true
      when: not k3s_secrets_post_snapshot_marker.stat.exists

    - name: Verify encrypted snapshot exists in S3
      ansible.builtin.command:
        argv: [k3s, etcd-snapshot, list, --s3, --s3-config-secret=etcd-s3-config]
      changed_when: false
      register: k3s_secrets_encrypted_snapshot_list
      failed_when: k3s_secrets_encrypted_snapshot_name not in k3s_secrets_encrypted_snapshot_list.stdout

    - name: Persist verified encrypted snapshot marker
      ansible.builtin.copy:
        dest: "{{ k3s_secrets_operation_root }}/post-snapshot.name"
        content: "{{ k3s_secrets_encrypted_snapshot_name }}\n"
        owner: root
        group: root
        mode: "0600"
      when: not k3s_secrets_post_snapshot_marker.stat.exists

- name: Final cluster gates after secrets-at-rest enablement
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vars/k3s-upgrade.yml
  tasks:
    - name: Require healthy cluster after encryption
      ansible.builtin.command:
        argv:
          - "{{ playbook_dir }}/../../scripts/k3s_upgrade_gate.sh"
          - final
          - --expected-versions
          - v1.35.6+k3s1
      environment:
        KUBECTL_BIN: "{{ k3s_upgrade_kubectl }}"
        EXPECTED_KUBE_CONTEXT: "{{ k3s_upgrade_expected_context }}"
      changed_when: false

    - name: Run strict OpenClaw functional contracts after encryption
      ansible.builtin.command:
        argv:
          - "{{ playbook_dir }}/../../scripts/openclaw_functional_gate.sh"
          - --expected-k3s-version
          - v1.35.6+k3s1
      environment:
        KUBECTL_BIN: "{{ k3s_upgrade_kubectl }}"
        EXPECTED_KUBE_CONTEXT: "{{ k3s_upgrade_expected_context }}"
        OPENCLAW_SMOKE_REPO: "{{ k3s_upgrade_openclaw_smoke_repo }}"
      changed_when: false
