# KS-5 control planes reached over the tailnet. The generated inventory
# (generated/ks5.ini) carries the OVH public IPs, but public SSH (:22) is
# closed by the tailscale-only hardening (2026-05-30) — day-2 playbooks must
# connect through these FQDNs instead.
[ks5_control_plane]
ks5-cp-1 ansible_host=ks5-cp-1.taile0ad27.ts.net edge_wan_interface=enp3s0f0
ks5-cp-2 ansible_host=ks5-cp-2.taile0ad27.ts.net edge_wan_interface=enp3s0f0
ks5-cp-3 ansible_host=ks5-cp-3.taile0ad27.ts.net edge_wan_interface=eno1

[ks5_control_plane:vars]
ansible_user=ubuntu

# The guard is deployed only over the Tailnet. It never relies on direct
# public SSH. Sauvage is intentionally included because it also hosts k3s
# edge workloads and has exposed Kubernetes-managed ports in the past.
[edge_wan_workers]
sauvage ansible_host=100.109.183.9 edge_wan_interface=enp5s0f0

[edge_wan_workers:vars]
ansible_user=ubuntu

[edge_wan_firewall:children]
ks5_control_plane
edge_wan_workers
