# KS-5 control planes reached over the tailnet. The generated inventory
# (generated/ks5.ini) carries the OVH public IPs, but public SSH (:22) is
# closed by the tailscale-only hardening (2026-05-30) — day-2 playbooks must
# connect through these FQDNs instead.
[ks5_control_plane]
ks5-cp-1 ansible_host=ks5-cp-1.taile0ad27.ts.net
ks5-cp-2 ansible_host=ks5-cp-2.taile0ad27.ts.net
ks5-cp-3 ansible_host=ks5-cp-3.taile0ad27.ts.net

[ks5_control_plane:vars]
ansible_user=ubuntu
