# Harbor — private container registry with Trivy scanning + S3 blobs on MinIO
expose:
  type: clusterIP
  tls:
    enabled: false   # TLS termination at Traefik
  clusterIP:
    name: harbor

externalURL: https://harbor.lan.e-dani.com

# pin storage type to S3 (MinIO)
persistence:
  enabled: true
  resourcePolicy: keep
  persistentVolumeClaim:
    registry:
      size: 5Gi
      storageClass: longhorn
    jobservice:
      jobLog:
        size: 1Gi
        storageClass: longhorn
    database:
      size: 5Gi
      storageClass: longhorn
    redis:
      size: 1Gi
      storageClass: longhorn
    trivy:
      size: 5Gi
      storageClass: longhorn
  imageChartStorage:
    disableredirect: true   # never redirect blob fetches to S3 — node containerd can't resolve *.svc.cluster.local
    type: s3
    s3:
      region: us-east-1
      bucket: harbor-blobs
      accesskey: dibanez
      secretkey: "ChangeMe-MinIO-Bootstrap-2026!"
      regionendpoint: http://minio-s3.minio.svc.cluster.local:9000
      secure: false
      v4auth: true
      # Large AI image layers are copied inside the S3 backend when a blob is
      # committed. Keep that copy single-threaded for MinIO; concurrent multipart
      # copy intermittently returned IncompleteBody on multi-GB layers.
      multipartcopymaxconcurrency: "1"
      multipartcopychunksize: "33554432"

harborAdminPassword: "ChangeMe-Harbor-Bootstrap-2026!"

# Internal TLS off (Traefik does TLS)
internalTLS:
  enabled: false

trivy:
  enabled: true
  replicas: 1
  nodeSelector:
    node-pool: ks5-nvme
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

# Disable Notary (deprecated)
notary:
  enabled: false

chartmuseum:
  enabled: false   # use OCI charts (modern Helm)

# Pin to the ks5 (OVH) HA control-plane pool — off the ubuntu home node. ks5 are
# amd64 (Harbor images are amd64-only) and already host harbor's stateful pods.
nodeSelector:
  node-pool: ks5-nvme

# Limit replicas for homelab — propagate arch nodeSelector everywhere
portal:
  replicas: 1
  nodeSelector:
    node-pool: ks5-nvme
core:
  replicas: 1
  nodeSelector:
    node-pool: ks5-nvme
jobservice:
  replicas: 1
  nodeSelector:
    node-pool: ks5-nvme
registry:
  replicas: 1
  nodeSelector:
    node-pool: ks5-nvme
nginx:
  nodeSelector:
    node-pool: ks5-nvme
database:
  internal:
    nodeSelector:
      node-pool: ks5-nvme
redis:
  internal:
    nodeSelector:
      node-pool: ks5-nvme
