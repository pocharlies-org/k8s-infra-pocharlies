# Kyverno admission policies controller
# Helm chart: kyverno/kyverno
admissionController:
  replicas: 2
  nodeSelector:
    node-pool: ks5-nvme
  tolerations:
    - key: dedicated
      operator: Equal
      value: llm
      effect: NoSchedule
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi

backgroundController:
  tolerations:
    - key: dedicated
      operator: Equal
      value: llm
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

cleanupController:
  tolerations:
    - key: dedicated
      operator: Equal
      value: llm
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

reportsController:
  tolerations:
    - key: dedicated
      operator: Equal
      value: llm
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

features:
  policyExceptions:
    enabled: true
    namespace: monitoring

# Grafana dashboard configmap for kyverno metrics
grafana:
  enabled: true
