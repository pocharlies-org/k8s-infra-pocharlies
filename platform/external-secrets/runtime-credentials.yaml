---
# Runtime registry credentials. The existing `harbor-pull` Secrets were copied
# out of band and several contain push-capable credentials. During adoption this
# resource uses Merge so ESO can replace only `.dockerconfigjson` atomically
# without deleting the Secret that running workloads reference.
#
# Vault prerequisite (KV v2):
#   secret/infra/harbor/k8s-runtime-pull
#     dockerconfigjson: raw Docker config JSON for a pull-only Harbor robot
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: harbor-runtime-pull
  labels:
    app.kubernetes.io/managed-by: external-secrets
    security.e-dani.com/rotation-class: runtime-registry
spec:
  externalSecretName: harbor-runtime-pull
  namespaces:
    - analytics-mcp
    - bambulab
    - benchmark
    - brain-mcp
    - comfyui
    - control-nexus
    - cv
    - dgx-call-agent
    - dgx-synapse-mcp
    - document-intake
    - gsc-mcp
    - image-mcp
    - libreplay
    - libreplay-staging
    - lipsync
    - litellm
    - llm
    - monitoring
    - offers-mcp
    - openclaw-qwen36
    - picqer-mcp
    - serpientetool
    - shopify-admin-mcp
    - shopify-mcp
    - skirmshop
    - studio-mcp
    - synapse
    - teslamate
    - traefik-edge
    - tts-mcp
    - video-mcp
    - whatsapp-mcp
    - workspace-mcp
  refreshTime: 5m
  externalSecretMetadata:
    labels:
      app.kubernetes.io/managed-by: external-secrets
      security.e-dani.com/rotation-class: runtime-registry
  externalSecretSpec:
    refreshInterval: 15m
    refreshPolicy: Periodic
    secretStoreRef:
      name: vault-backend
      kind: ClusterSecretStore
    target:
      name: harbor-pull
      creationPolicy: Merge
      deletionPolicy: Retain
      template:
        engineVersion: v2
        type: kubernetes.io/dockerconfigjson
        metadata:
          labels:
            app.kubernetes.io/managed-by: external-secrets
            security.e-dani.com/rotation-class: runtime-registry
    data:
      - secretKey: .dockerconfigjson
        remoteRef:
          key: secret/infra/harbor/k8s-runtime-pull
          property: dockerconfigjson
          conversionStrategy: Default
          decodingStrategy: None
          metadataPolicy: None
          nullBytePolicy: Fail
---
# Active token for Kubernetes clients of the catalog API. Clients receive only
# the active value; the overlap credential is kept out of client namespaces.
#
# Vault prerequisite (KV v2):
#   secret/skirmshop/catalog-api
#     active:   current client credential
#     previous: overlap credential accepted by the server during rotation only
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: catalog-api-client
  labels:
    app.kubernetes.io/managed-by: external-secrets
    security.e-dani.com/rotation-class: catalog-api
spec:
  externalSecretName: catalog-api-client
  namespaces:
    - offers-mcp
    - skirmshop
    - synapse
  refreshTime: 5m
  externalSecretMetadata:
    labels:
      app.kubernetes.io/managed-by: external-secrets
      security.e-dani.com/rotation-class: catalog-api
  externalSecretSpec:
    refreshInterval: 15m
    refreshPolicy: Periodic
    secretStoreRef:
      name: vault-backend
      kind: ClusterSecretStore
    target:
      name: catalog-api-client
      creationPolicy: Owner
      deletionPolicy: Retain
    data:
      - secretKey: CATALOG_SYNC_TOKEN
        remoteRef:
          key: secret/skirmshop/catalog-api
          property: active
          conversionStrategy: Default
          decodingStrategy: None
          metadataPolicy: None
          nullBytePolicy: Fail
---
# Server-only overlap Secret. rag-app must explicitly reference both keys; the
# broad legacy `rag-secrets` envFrom is not the owner of these credentials.
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: catalog-api-server
  labels:
    app.kubernetes.io/managed-by: external-secrets
    security.e-dani.com/rotation-class: catalog-api
spec:
  externalSecretName: catalog-api-server
  namespaces:
    - skirmshop
  refreshTime: 5m
  externalSecretMetadata:
    labels:
      app.kubernetes.io/managed-by: external-secrets
      security.e-dani.com/rotation-class: catalog-api
  externalSecretSpec:
    refreshInterval: 15m
    refreshPolicy: Periodic
    secretStoreRef:
      name: vault-backend
      kind: ClusterSecretStore
    target:
      name: catalog-api-server
      creationPolicy: Owner
      deletionPolicy: Retain
    data:
      - secretKey: CATALOG_SYNC_TOKEN
        remoteRef:
          key: secret/skirmshop/catalog-api
          property: active
          conversionStrategy: Default
          decodingStrategy: None
          metadataPolicy: None
          nullBytePolicy: Fail
      - secretKey: CATALOG_SYNC_TOKEN_PREVIOUS
        remoteRef:
          key: secret/skirmshop/catalog-api
          property: previous
          conversionStrategy: Default
          decodingStrategy: None
          metadataPolicy: None
          nullBytePolicy: Fail
