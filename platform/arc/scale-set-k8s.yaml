# ARC Runner Scale Set — arc-k8s (shared, organization scope)
# Helm chart: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set
# Namespace: arc-runners
#
# Single shared runner for the whole pocharlies-org organization. All repos
# target it with `runner: arc-k8s` (callers of the reusable workflows in
# pocharlies-org/k8s-gitops-pocharlies). Org-scope runners are only available
# to repositories inside pocharlies-org.
#
# Auth: PAT (org scope) with repo+workflow in secret arc-github-pat-secret
# (arc-runners namespace):
#   kubectl create secret generic arc-github-pat-secret -n arc-runners \
#     --from-literal=github_token=<PAT>
#
# Image build jobs use Docker/container actions, so this scale set runs in dind
# mode. DinD is privileged; keep these runners isolated in arc-runners.

githubConfigUrl: https://github.com/pocharlies-org
githubConfigSecret: arc-github-pat-secret

controllerServiceAccount:
  namespace: arc-systems
  name: arc-gha-rs-controller

runnerScaleSetName: arc-k8s

minRunners: 0
maxRunners: 8

containerMode:
  type: dind

template:
  spec:
    # Prefer the NVMe dev node (ubuntu) for CI. sauvage is an HDD edge node; concurrent
    # CI image pulls/builds saturate its disk I/O and stall container creation
    # cluster-wide (CreateContainerError: context deadline exceeded). 2026-06-04.
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
              - ubuntu
    nodeSelector:
      kubernetes.io/arch: amd64
      workload: cpu
    tolerations:
    - effect: NoSchedule
      key: role
      operator: Equal
      value: edge
    # Tolerate ubuntu's soft pool=dev taint so the ubuntu affinity above actually wins —
    # without this the PreferNoSchedule penalty outweighs the affinity and runners flock
    # to sauvage. sauvage remains a fallback only when ubuntu is full.
    - effect: PreferNoSchedule
      key: pool
      operator: Equal
      value: dev
