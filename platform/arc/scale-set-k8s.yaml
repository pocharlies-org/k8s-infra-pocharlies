# ARC Runner Scale Set — arc-k8s (shared, organization scope)
# Helm chart: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set (0.14.1)
# Namespace: arc-runners
#
# Single shared runner for the whole pocharlies-org organization. ALL org CI now
# runs exclusively here (no GitHub-hosted runners) — repos target it with
# `runs-on: arc-k8s`. Org-scope runners are only available to repositories inside
# pocharlies-org.
#
# Auth: GitHub App, secret `arc-github-app` (arc-runners namespace), materialized
# from Vault by external-secrets (see arc-github-app-externalsecret.yaml).
# NOTE: an earlier revision of this file referenced a PAT secret
# `arc-github-pat-secret` that no longer exists — the live release uses the App.
#
# Image build jobs use Docker/container actions, so this scale set runs in dind
# mode. DinD is privileged; keep these runners isolated in arc-runners.
#
# This is a DIRECT Helm release (NOT ArgoCD-managed). Apply changes with:
#   helm upgrade arc-k8s \
#     oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set \
#     --version 0.14.1 -n arc-runners -f platform/arc/scale-set-k8s.yaml

githubConfigUrl: https://github.com/pocharlies-org
githubConfigSecret: arc-github-app

controllerServiceAccount:
  namespace: arc-systems
  name: arc-gha-rs-controller

runnerScaleSetName: arc-k8s

minRunners: 0
# Keep DinD builds off the edge/business node. A 2026-06-18 audit found ARC
# runners on sauvage driving NodeDiskIOSaturation and kubelet exec/probe
# timeouts. Limit concurrency until there is a dedicated non-edge CPU pool.
maxRunners: 4

containerMode:
  type: dind

template:
  spec:
    # Run only on non-edge amd64 CPU nodes. Do not tolerate `role=edge`; that
    # keeps Docker-in-Docker image builds away from sauvage and its Skirmshop /
    # Synapse workloads.
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: kubernetes.io/hostname
              operator: NotIn
              values:
              - sauvage
    nodeSelector:
      kubernetes.io/arch: amd64
      workload: cpu
    tolerations:
    - effect: PreferNoSchedule
      key: pool
      operator: Equal
      value: dev
