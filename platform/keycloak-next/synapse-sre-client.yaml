apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: synapse-sre-keycloak-bootstrap
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: synapse-sre-client
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: synapse-sre-keycloak-bootstrap
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: client_secret
      remoteRef:
        key: secret/agentgateway/prod
        property: synapse_sre_orchestrator_client_secret
---
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-synapse-sre-client
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: synapse-sre-client
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "22"
    synapse.e-dani.com/reconcile-contract-version: "1"
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: synapse-sre-client
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      enableServiceLinks: false
      nodeSelector:
        node-pool: ks5-nvme
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: reconcile-client
          image: quay.io/keycloak/keycloak:26.6.2@sha256:f9ba7b2af90db8dc749a57ca9aedca51e840cb9224441ab546a968da941da900
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/opt/bootstrap/synapse-sre-client.sh"]
          envFrom:
            - secretRef:
                name: keycloak-bootstrap
          env:
            - { name: MODE, value: ensure }
            - { name: KEYCLOAK_URL, value: http://keycloak.keycloak.svc.cluster.local }
            - { name: REALM, value: edani }
            - { name: CLIENT_ID, value: synapse-sre-orchestrator }
            - { name: ROLE_NAME, value: synapse-sre-m2m }
            - { name: AGENTGATEWAY_AUDIENCE, value: mcp.lan.e-dani.com }
            - { name: FORBIDDEN_REALM_ROLE, value: agentgateway-write }
            - { name: RECONCILE_CONTRACT_VERSION, value: "1" }
            - name: SYNAPSE_SRE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: synapse-sre-keycloak-bootstrap
                  key: client_secret
            - { name: HOME, value: /tmp }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: bootstrap, mountPath: /opt/bootstrap, readOnly: true }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: bootstrap
          configMap:
            name: keycloak-synapse-sre-client
            defaultMode: 0555
        - name: tmp
          emptyDir: { sizeLimit: 16Mi }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: keycloak-synapse-sre-client-egress
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: synapse-sre-client
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: synapse-sre-client
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels: { app: keycloak }
      ports:
        - { protocol: TCP, port: 8080 }
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: kube-system }
          podSelector:
            matchLabels: { k8s-app: kube-dns }
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
