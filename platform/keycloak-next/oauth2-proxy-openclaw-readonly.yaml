apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-openclaw-readonly-config
  namespace: keycloak
  labels:
    app.kubernetes.io/name: oauth2-proxy-openclaw-readonly
    app.kubernetes.io/component: forward-auth
data:
  allowed-emails: |
    info@e-dani.com
  oauth2_proxy.cfg: |
    provider = "keycloak-oidc"
    provider_display_name = "Keycloak"
    oidc_issuer_url = "https://auth-next.e-dani.com/realms/edani"
    skip_oidc_discovery = true
    login_url = "https://auth-next.e-dani.com/realms/edani/protocol/openid-connect/auth"
    redeem_url = "http://keycloak.keycloak.svc.cluster.local/realms/edani/protocol/openid-connect/token"
    profile_url = "http://keycloak.keycloak.svc.cluster.local/realms/edani/protocol/openid-connect/userinfo"
    validate_url = "http://keycloak.keycloak.svc.cluster.local/realms/edani/protocol/openid-connect/userinfo"
    oidc_jwks_url = "http://keycloak.keycloak.svc.cluster.local/realms/edani/protocol/openid-connect/certs"
    redirect_url = "https://openclaw-k8s-readonly.e-dani.com/oauth2/callback"
    scope = "openid email profile"

    reverse_proxy = true
    http_address = "0.0.0.0:4180"
    upstreams = [ "static://202" ]

    cookie_name = "_openclaw_readonly_sso"
    cookie_domains = [ ".e-dani.com" ]
    cookie_secure = true
    cookie_httponly = true
    cookie_samesite = "lax"
    cookie_expire = "8h"
    cookie_refresh = "30m"

    whitelist_domains = [ ".e-dani.com" ]
    authenticated_emails_file = "/etc/oauth2-proxy/allowed-emails"

    pass_access_token = false
    pass_user_headers = true
    set_authorization_header = false
    set_xauthrequest = true
    skip_provider_button = true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-openclaw-readonly
  namespace: keycloak
  labels:
    app.kubernetes.io/name: oauth2-proxy-openclaw-readonly
    app.kubernetes.io/component: forward-auth
spec:
  replicas: 2
  selector:
    matchLabels: { app: oauth2-proxy-openclaw-readonly }
  template:
    metadata:
      labels:
        app: oauth2-proxy-openclaw-readonly
        app.kubernetes.io/name: oauth2-proxy-openclaw-readonly
        app.kubernetes.io/component: forward-auth
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      nodeSelector:
        node-pool: ks5-nvme
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels: { app: oauth2-proxy-openclaw-readonly }
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2@sha256:aa0bd8dd5ab0c78e4c91c92755ad573a5f92241f88138b4141b8ec803463b4fd
          args: ["--config=/etc/oauth2-proxy/oauth2_proxy.cfg"]
          env:
            - { name: OAUTH2_PROXY_CLIENT_ID, value: openclaw-readonly-ui }
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: openclaw-readonly-ui-secrets
                  key: OAUTH2_PROXY_CLIENT_SECRET
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: openclaw-readonly-ui-secrets
                  key: OAUTH2_PROXY_COOKIE_SECRET
          ports:
            - { name: http, containerPort: 4180 }
          volumeMounts:
            - name: config
              mountPath: /etc/oauth2-proxy/oauth2_proxy.cfg
              subPath: oauth2_proxy.cfg
              readOnly: true
            - name: config
              mountPath: /etc/oauth2-proxy/allowed-emails
              subPath: allowed-emails
              readOnly: true
            - { name: tmp, mountPath: /tmp }
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /ping, port: http }
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: config
          configMap:
            name: oauth2-proxy-openclaw-readonly-config
            defaultMode: 0444
        - name: tmp
          emptyDir: { sizeLimit: 32Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-openclaw-readonly
  namespace: keycloak
  labels:
    app.kubernetes.io/name: oauth2-proxy-openclaw-readonly
    app.kubernetes.io/component: forward-auth
spec:
  selector: { app: oauth2-proxy-openclaw-readonly }
  ports:
    - { name: http, port: 4180, targetPort: http }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: oauth2-proxy-openclaw-readonly
  namespace: keycloak
spec:
  minAvailable: 1
  selector:
    matchLabels: { app: oauth2-proxy-openclaw-readonly }
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sso-openclaw-readonly-forward-auth
  namespace: keycloak
  labels:
    app.kubernetes.io/name: oauth2-proxy-openclaw-readonly
    app.kubernetes.io/component: forward-auth
spec:
  forwardAuth:
    address: http://oauth2-proxy-openclaw-readonly.keycloak.svc.cluster.local:4180/oauth2/auth
    trustForwardHeader: true
    maxResponseBodySize: 1048576
    authResponseHeaders:
      - X-Auth-Request-Email
      - X-Auth-Request-Groups
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sso-openclaw-readonly-errors
  namespace: keycloak
  labels:
    app.kubernetes.io/name: oauth2-proxy-openclaw-readonly
    app.kubernetes.io/component: forward-auth
spec:
  errors:
    status: ["401-403"]
    service:
      name: oauth2-proxy-openclaw-readonly
      port: 4180
    query: /oauth2/sign_in?rd={url}
    statusRewrites:
      "401": 302
      "403": 302
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sso-openclaw-readonly-chain
  namespace: keycloak
  labels:
    app.kubernetes.io/name: oauth2-proxy-openclaw-readonly
    app.kubernetes.io/component: forward-auth
spec:
  chain:
    middlewares:
      - name: sso-openclaw-readonly-errors
      - name: sso-openclaw-readonly-forward-auth
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: oauth2-proxy-openclaw-readonly
  namespace: keycloak
  labels:
    app.kubernetes.io/name: oauth2-proxy-openclaw-readonly
    app.kubernetes.io/component: forward-auth
spec:
  podSelector:
    matchLabels: { app: oauth2-proxy-openclaw-readonly }
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: traefik-lan }
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: traefik-lan-traefik-lan
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: traefik-edge }
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: traefik-edge-traefik-edge
        - ipBlock: { cidr: 100.107.21.89/32 }
        - ipBlock: { cidr: 100.71.117.127/32 }
        - ipBlock: { cidr: 100.75.189.75/32 }
        - ipBlock: { cidr: 100.109.183.9/32 }
        - ipBlock: { cidr: 141.94.73.52/32 }
        - ipBlock: { cidr: 141.94.73.50/32 }
        - ipBlock: { cidr: 145.239.194.168/32 }
        - ipBlock: { cidr: 57.129.17.172/32 }
      ports:
        - { protocol: TCP, port: 4180 }
  egress:
    - to:
        - podSelector:
            matchLabels: { app: keycloak }
      ports:
        - { protocol: TCP, port: 8080 }
    - to:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: kube-system }
          podSelector:
            matchLabels: { k8s-app: kube-dns }
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
