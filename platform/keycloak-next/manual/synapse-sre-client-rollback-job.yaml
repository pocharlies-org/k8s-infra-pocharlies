apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-synapse-sre-client-rollback
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: synapse-sre-client-rollback
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: synapse-sre-client-rollback
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      enableServiceLinks: false
      nodeSelector: { node-pool: ks5-nvme }
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: rollback-client
          image: quay.io/keycloak/keycloak:26.6.2@sha256:f9ba7b2af90db8dc749a57ca9aedca51e840cb9224441ab546a968da941da900
          command: ["/bin/sh", "/opt/bootstrap/synapse-sre-client.sh"]
          envFrom:
            - secretRef: { name: keycloak-bootstrap }
          env:
            - { name: MODE, value: rollback }
            - { name: CLIENT_ID, value: synapse-sre-orchestrator }
            - { name: ROLE_NAME, value: synapse-sre-m2m }
            - { name: HOME, value: /tmp }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: bootstrap, mountPath: /opt/bootstrap, readOnly: true }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: bootstrap
          configMap:
            name: keycloak-synapse-sre-client
            defaultMode: 0555
        - name: tmp
          emptyDir: { sizeLimit: 16Mi }
