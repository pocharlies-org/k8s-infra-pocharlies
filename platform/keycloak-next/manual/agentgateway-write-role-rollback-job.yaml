# Manual state rollback. This file is intentionally excluded from kustomization.
# Follow RUNBOOK.md: disable both AgentGateway write switches first, then apply.
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-agentgateway-write-role-rollback
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: agentgateway-write-role
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: agentgateway-write-role
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rollback-role
          image: quay.io/keycloak/keycloak:26.6.2@sha256:f9ba7b2af90db8dc749a57ca9aedca51e840cb9224441ab546a968da941da900
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/opt/bootstrap/agentgateway-write-role.sh"]
          envFrom:
            - secretRef:
                name: keycloak-bootstrap
          env:
            - name: MODE
              value: rollback
            - name: KEYCLOAK_URL
              value: http://keycloak.keycloak.svc.cluster.local
            - name: REALM
              value: edani
            - name: CLIENT_ID
              value: agentgateway-mcp
            - name: ROLE_NAME
              value: agentgateway-write
            - name: HOME
              value: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: bootstrap
              mountPath: /opt/bootstrap
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: bootstrap
          configMap:
            name: keycloak-agentgateway-write-role
            defaultMode: 0555
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
