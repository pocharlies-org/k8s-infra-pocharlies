# Manual state rollback. This file is intentionally excluded from Kustomize.
# Disable/prune the OpenClaw read-only Deployment and oauth2-proxy first, then
# apply this Job only after confirming no active sessions depend on the clients.
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-openclaw-readonly-clients-rollback
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: openclaw-readonly-clients
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: openclaw-readonly-clients
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      enableServiceLinks: false
      nodeSelector: { node-pool: ks5-nvme }
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: rollback-clients
          image: quay.io/keycloak/keycloak:26.6.2@sha256:f9ba7b2af90db8dc749a57ca9aedca51e840cb9224441ab546a968da941da900
          command: ["/bin/sh", "/opt/bootstrap/openclaw-readonly-clients.sh"]
          envFrom:
            - secretRef: { name: keycloak-bootstrap }
          env:
            - { name: MODE, value: rollback }
            - { name: KEYCLOAK_URL, value: http://keycloak.keycloak.svc.cluster.local }
            - { name: REALM, value: edani }
            - { name: UI_CLIENT_ID, value: openclaw-readonly-ui }
            - { name: AGENTGATEWAY_CLIENT_ID, value: openclaw-readonly-agentgateway }
            - { name: OPERATOR_EMAIL, value: info@e-dani.com }
            - { name: AGENTGATEWAY_AUDIENCE, value: mcp.lan.e-dani.com }
            - { name: FORBIDDEN_REALM_ROLE, value: agentgateway-write }
            - { name: HOME, value: /tmp }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: bootstrap, mountPath: /opt/bootstrap, readOnly: true }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: bootstrap
          configMap:
            name: keycloak-openclaw-readonly-clients
            defaultMode: 0555
        - name: tmp
          emptyDir: { sizeLimit: 16Mi }
