apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: keycloak
resources:
  - namespace.yaml
  - database.yaml
  - keycloak.yaml
  - oauth2-proxy.yaml
  - oauth2-proxy-skirmshop.yaml
  - oauth2-proxy-openclaw-readonly.yaml
  - routing.yaml
  - agentgateway-write-role-job.yaml
  - openclaw-readonly-clients.yaml
  - synapse-sre-client.yaml
  - agentgateway-domain-roles-job.yaml
configMapGenerator:
  - name: keycloak-agentgateway-write-role
    files:
      - agentgateway-write-role.sh=scripts/agentgateway-write-role.sh
  - name: keycloak-openclaw-readonly-clients
    files:
      - openclaw-readonly-clients.sh=scripts/openclaw-readonly-clients.sh
  - name: keycloak-synapse-sre-client
    files:
      - synapse-sre-client.sh=scripts/synapse-sre-client.sh
  - name: keycloak-agentgateway-domain-roles
    files:
      - agentgateway-domain-roles.sh=scripts/agentgateway-domain-roles.sh
    options:
      labels:
        app.kubernetes.io/component: agentgateway-domain-roles
generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/name: keycloak
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: auth-migration
      app.kubernetes.io/managed-by: argocd
