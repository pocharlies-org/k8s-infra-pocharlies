# =============================================================================
# oauth2-proxy-tomorrowland — forward-auth gate for https://tomorrowland.e-dani.com
#
# Cloned from oauth2-proxy-skirmshop.yaml. Differences:
#   - dedicated cookie name (_tomorrowland_sso) so sessions are isolated
#   - redirect_url points at the tomorrowland host's /oauth2/callback
#   - access is restricted to ONE email (me@e-dani.com) via an
#     authenticated_emails_file allowlist instead of an allowed_groups claim.
#     This is the cleanest restriction: it needs NO new Keycloak group/role and
#     NO per-user Keycloak admin step. Any edani-realm user can authenticate at
#     Keycloak, but only emails in the allowlist are authorized by the proxy.
#
# Reuses the shared confidential Keycloak client via the existing
# ExternalSecret `oauth2-proxy-secrets` (Vault secret/keycloak-next/oauth2-proxy).
# No secret material lives in git.
#
# REQUIRED Keycloak-admin step (one-time): add the redirect URI
#   https://tomorrowland.e-dani.com/oauth2/callback
# to the `oauth2-proxy` client in realm `edani` UNLESS a wildcard
# `https://*.e-dani.com/oauth2/callback` is already registered. See repo README.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-tomorrowland-config
  namespace: keycloak
  labels:
    app.kubernetes.io/name: oauth2-proxy-tomorrowland
    app.kubernetes.io/component: forward-auth
data:
  oauth2_proxy.cfg: |
    provider = "keycloak-oidc"
    provider_display_name = "Keycloak"
    oidc_issuer_url = "https://auth-next.e-dani.com/realms/edani"
    skip_oidc_discovery = true
    login_url = "https://auth-next.e-dani.com/realms/edani/protocol/openid-connect/auth"
    redeem_url = "http://keycloak.keycloak.svc.cluster.local/realms/edani/protocol/openid-connect/token"
    profile_url = "http://keycloak.keycloak.svc.cluster.local/realms/edani/protocol/openid-connect/userinfo"
    validate_url = "http://keycloak.keycloak.svc.cluster.local/realms/edani/protocol/openid-connect/userinfo"
    oidc_jwks_url = "http://keycloak.keycloak.svc.cluster.local/realms/edani/protocol/openid-connect/certs"
    redirect_url = "https://tomorrowland.e-dani.com/oauth2/callback"
    scope = "openid email profile"

    reverse_proxy = true
    http_address = "0.0.0.0:4180"
    upstreams = [ "static://202" ]

    cookie_name = "_tomorrowland_sso"
    cookie_secure = true
    cookie_samesite = "lax"
    cookie_expire = "12h"
    cookie_refresh = "1h"

    # Acotado al propio host (no ".e-dani.com") para cerrar open-redirect post-login.
    whitelist_domains = [ "tomorrowland.e-dani.com" ]

    # Single-user restriction. email_domains = "*" lets any verified email
    # complete OIDC; the authenticated_emails_file is the hard authorization
    # allowlist. Only me@e-dani.com passes.
    email_domains = [ "*" ]
    authenticated_emails_file = "/etc/oauth2-proxy/allowed-emails"

    pass_access_token = true
    pass_user_headers = true
    set_authorization_header = true
    set_xauthrequest = true
    skip_provider_button = true
  allowed-emails: |
    me@e-dani.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-tomorrowland
  namespace: keycloak
  labels:
    app.kubernetes.io/name: oauth2-proxy-tomorrowland
    app.kubernetes.io/component: forward-auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oauth2-proxy-tomorrowland
  template:
    metadata:
      labels:
        app: oauth2-proxy-tomorrowland
    spec:
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
          args: ["--config=/etc/oauth2-proxy/oauth2_proxy.cfg"]
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: oauth2-proxy-secrets
          ports:
            - { name: http, containerPort: 4180 }
          volumeMounts:
            - name: config
              mountPath: /etc/oauth2-proxy/oauth2_proxy.cfg
              subPath: oauth2_proxy.cfg
              readOnly: true
            - name: config
              mountPath: /etc/oauth2-proxy/allowed-emails
              subPath: allowed-emails
              readOnly: true
          readinessProbe:
            httpGet: { path: /ping, port: http }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /ping, port: http }
            initialDelaySeconds: 15
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
      volumes:
        - name: config
          configMap:
            name: oauth2-proxy-tomorrowland-config
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-tomorrowland
  namespace: keycloak
  labels:
    app.kubernetes.io/name: oauth2-proxy-tomorrowland
    app.kubernetes.io/component: forward-auth
spec:
  selector:
    app: oauth2-proxy-tomorrowland
  ports:
    - { name: http, port: 4180, targetPort: http }
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sso-tomorrowland-forward-auth
  namespace: keycloak
  labels:
    app.kubernetes.io/name: oauth2-proxy-tomorrowland
    app.kubernetes.io/component: forward-auth
spec:
  forwardAuth:
    address: http://oauth2-proxy-tomorrowland.keycloak.svc.cluster.local:4180/oauth2/auth
    trustForwardHeader: true
    maxResponseBodySize: 1048576
    authResponseHeaders:
      - Authorization
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Groups
      - X-Forwarded-User
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sso-tomorrowland-errors
  namespace: keycloak
  labels:
    app.kubernetes.io/name: oauth2-proxy-tomorrowland
    app.kubernetes.io/component: forward-auth
spec:
  errors:
    status:
      - "401-403"
    service:
      name: oauth2-proxy-tomorrowland
      port: 4180
    query: /oauth2/sign_in?rd={url}
    statusRewrites:
      "401": 302
      "403": 302
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: sso-tomorrowland-chain
  namespace: keycloak
  labels:
    app.kubernetes.io/name: oauth2-proxy-tomorrowland
    app.kubernetes.io/component: forward-auth
spec:
  chain:
    middlewares:
      - name: sso-tomorrowland-errors
      - name: sso-tomorrowland-forward-auth
