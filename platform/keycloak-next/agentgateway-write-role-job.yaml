apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-agentgateway-write-role
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: agentgateway-write-role
  annotations:
    argocd.argoproj.io/hook: PostSync
    # Keep the sanitized success log long enough for the coordinated cutover gate.
    # The next sync replaces the hook; Kubernetes removes it after one hour.
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "20"
spec:
  backoffLimit: 1
  # This fail-closed audit invokes kcadm repeatedly to prove exclusive role
  # ownership and token claims. Keep the same production-safe margin as the
  # domain-role reconciler instead of racing a five-minute sync deadline.
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: agentgateway-write-role
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: reconcile-role
          image: quay.io/keycloak/keycloak:26.6.2@sha256:f9ba7b2af90db8dc749a57ca9aedca51e840cb9224441ab546a968da941da900
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/opt/bootstrap/agentgateway-write-role.sh"]
          envFrom:
            - secretRef:
                name: keycloak-bootstrap
          env:
            - name: MODE
              value: ensure
            - name: KEYCLOAK_URL
              value: http://keycloak.keycloak.svc.cluster.local
            - name: REALM
              value: edani
            - name: CLIENT_ID
              value: agentgateway-mcp
            - name: ROLE_NAME
              value: agentgateway-write
            - name: HOME
              value: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: bootstrap
              mountPath: /opt/bootstrap
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: bootstrap
          configMap:
            name: keycloak-agentgateway-write-role
            defaultMode: 0555
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: keycloak-agentgateway-write-role-egress
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: agentgateway-write-role
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: agentgateway-write-role
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: keycloak
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
