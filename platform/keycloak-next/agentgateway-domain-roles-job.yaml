apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-agentgateway-domain-roles
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: agentgateway-domain-roles
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "19"
spec:
  backoffLimit: 1
  # kcadm starts a JVM for every role/audit request. The nine-role reconcile
  # took 269s in production on 2026-07-15, leaving only 31s before Kubernetes
  # killed an otherwise healthy PostSync hook. Keep enough room for one slow
  # Keycloak response and the configured retry without weakening fail-closed
  # role validation.
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: agentgateway-domain-roles
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: reconcile-domain-roles
          image: quay.io/keycloak/keycloak:26.6.2@sha256:f9ba7b2af90db8dc749a57ca9aedca51e840cb9224441ab546a968da941da900
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/opt/bootstrap/agentgateway-domain-roles.sh"]
          envFrom:
            - secretRef:
                name: keycloak-bootstrap
          env:
            - { name: KEYCLOAK_URL, value: http://keycloak.keycloak.svc.cluster.local }
            - { name: REALM, value: edani }
            - name: ROLE_NAMES
              value: agentgateway-write:synapse,agentgateway-write:media,agentgateway-write:picqer,agentgateway-write:skirmshop-plugins,agentgateway-write:shopify,agentgateway-write:social,agentgateway-write:workspace,agentgateway-write:gsc,agentgateway-write:offers
            - { name: HOME, value: /tmp }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: bootstrap, mountPath: /opt/bootstrap, readOnly: true }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: bootstrap
          configMap:
            name: keycloak-agentgateway-domain-roles
            defaultMode: 0555
        - name: tmp
          emptyDir: { sizeLimit: 16Mi }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: keycloak-agentgateway-domain-roles-egress
  namespace: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: agentgateway-domain-roles
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: agentgateway-domain-roles
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector: { matchLabels: { app: keycloak } }
      ports: [{ protocol: TCP, port: 8080 }]
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: kube-system } }
          podSelector: { matchLabels: { k8s-app: kube-dns } }
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
