apiVersion: v1
kind: ConfigMap
metadata:
  name: velero-fsb-volume-policy
  namespace: velero
data:
  policies.yaml: |
    version: v1
    volumePolicies:
      # emptyDir is recreated empty with the Pod and has no durable DR value.
      # Keep the schedule in opt-out FSB mode so every mounted PVC that does
      # not match this rule remains protected without per-workload annotations.
      - conditions:
          volumeTypes:
            - emptyDir
        action:
          type: skip
