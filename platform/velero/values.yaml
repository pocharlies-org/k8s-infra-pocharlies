# Velero — cluster backups to MinIO (S3-compatible)
initContainers:
  - name: velero-plugin-for-aws
    # v1.14.x is the supported AWS plugin line for Velero 1.18.x. Pin the
    # multi-arch index so a mutable tag cannot change the rollout payload.
    image: docker.io/velero/velero-plugin-for-aws:v1.14.2@sha256:0751144c1c8e52d52c48717fbd13ad5a3061e612ae4d7ad744a946cd5b139d1a
    volumeMounts:
      - mountPath: /target
        name: plugins

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: velero-backups
      default: true
      config:
        region: us-east-1
        s3ForcePathStyle: true
        s3Url: http://minio-s3.minio.svc.cluster.local:9000
        publicUrl: https://s3.lan.e-dani.com
      credential:
        name: velero-minio-creds
        key: cloud

  volumeSnapshotLocation:
    - name: default
      provider: aws
      config:
        region: us-east-1

  # Daily maintenance keeps high-churn Kopia repositories below the index
  # blob warning threshold. Jobs remain serialized and resource-bounded.
  defaultRepoMaintainFrequency: 24h0m0s
  garbageCollectionFrequency: 1h0m0s
  features: EnableCSI
  logLevel: info
  # Velero 1.18 maintenance Jobs do not inherit the server nodeSelector. The
  # controller consumes only the first loadAffinity entry, so keep one exact
  # KS5 selector here and never add Ubuntu/LAN as a fallback.
  repositoryMaintenanceJob:
    repositoryConfigData:
      global:
        keepLatestMaintenanceJobs: 1
        podResources:
          cpuRequest: "100m"
          cpuLimit: "1"
          memoryRequest: "512Mi"
          memoryLimit: "2Gi"
        loadAffinity:
          - nodeSelector:
              matchExpressions:
                - key: node-pool
                  operator: In
                  values: ["ks5-nvme"]

# Use node-agent for filesystem backups and CSI snapshot data movement.
deployNodeAgent: true
nodeAgent:
  # Node-agent must run wherever protected Pods can land. Cover LAN and KS5
  # while excluding the remote Sauvage node whose overlay cannot reach MinIO.
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: topology
                operator: In
                values: ["lan", "ovh"]
  tolerations:
    - key: dedicated
      operator: Equal
      value: llm
      effect: NoSchedule
  extraArgs:
    - --node-agent-configmap=velero-node-agent-config
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# Velero server and serialized Kopia maintenance Jobs stay on KS5.
nodeSelector:
  node-pool: ks5-nvme
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

# Don't create the credential secret via chart — we'll apply it separately
credentials:
  useSecret: true
  existingSecret: velero-minio-creds

snapshotsEnabled: true
backupsEnabled: true
# deployRestic removed in newer chart; node-agent uses Kopia internally
