apiVersion: v1
kind: ServiceAccount
metadata:
  name: sauvage-pod-reaper
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sauvage-pod-reaper
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sauvage-pod-reaper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sauvage-pod-reaper
subjects:
  - kind: ServiceAccount
    name: sauvage-pod-reaper
    namespace: kube-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sauvage-pod-reaper
  namespace: kube-system
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 240
      backoffLimit: 1
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: sauvage-pod-reaper
        spec:
          serviceAccountName: sauvage-pod-reaper
          restartPolicy: Never
          enableServiceLinks: false
          nodeSelector:
            kubernetes.io/arch: amd64
          tolerations:
            - key: role
              operator: Equal
              value: edge
              effect: NoSchedule
          containers:
            - name: reaper
              image: alpine/k8s:1.32.5
              imagePullPolicy: IfNotPresent
              env:
                - name: TARGET_NODE
                  value: sauvage
                - name: TARGET_NAMESPACES
                  value: skirmshop
                - name: SUCCEEDED_TTL_SECONDS
                  value: "7200"
                - name: FAILED_TTL_SECONDS
                  value: "86400"
              resources:
                requests:
                  cpu: 20m
                  memory: 32Mi
                limits:
                  memory: 160Mi
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  node="${TARGET_NODE:-sauvage}"
                  namespaces="${TARGET_NAMESPACES:-skirmshop}"
                  now="$(date +%s)"
                  total=0

                  reap_phase() {
                    ns="$1"
                    phase="$2"
                    ttl="$3"
                    cutoff_epoch="$((now - ttl))"
                    cutoff="$(date -u -d "@$cutoff_epoch" +%Y-%m-%dT%H:%M:%SZ)"
                    marker="/tmp/reaped-$ns-$phase"
                    : > "$marker"

                    kubectl get pods -n "$ns" \
                      --field-selector="status.phase=$phase,spec.nodeName=$node" \
                      -o custom-columns=NAME:.metadata.name,START:.status.startTime \
                      --no-headers 2>/dev/null |
                    while read -r pod start; do
                      [ -n "${pod:-}" ] || continue
                      [ -n "${start:-}" ] || continue
                      if [ "$start" \< "$cutoff" ]; then
                        kubectl delete pod -n "$ns" "$pod" --wait=false --ignore-not-found >/dev/null
                        echo 1 >> "$marker"
                        echo "{\"msg\":\"pod-reaper.deleted\",\"namespace\":\"$ns\",\"pod\":\"$pod\",\"phase\":\"$phase\",\"node\":\"$node\",\"start\":\"$start\",\"cutoff\":\"$cutoff\"}"
                      fi
                    done
                  }

                  for ns in $namespaces; do
                    reap_phase "$ns" Succeeded "${SUCCEEDED_TTL_SECONDS:-7200}"
                    reap_phase "$ns" Failed "${FAILED_TTL_SECONDS:-86400}"
                    s="$(wc -l < "/tmp/reaped-$ns-Succeeded" 2>/dev/null || echo 0)"
                    f="$(wc -l < "/tmp/reaped-$ns-Failed" 2>/dev/null || echo 0)"
                    total=$((total + s + f))
                    echo "{\"msg\":\"pod-reaper.namespace\",\"namespace\":\"$ns\",\"node\":\"$node\",\"succeeded_deleted\":$s,\"failed_deleted\":$f}"
                  done

                  echo "{\"msg\":\"pod-reaper.done\",\"node\":\"$node\",\"deleted\":$total}"
