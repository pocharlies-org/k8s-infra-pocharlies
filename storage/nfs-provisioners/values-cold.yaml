# NFS Subdir External Provisioner — StorageClass: nfs-cold
# NFS server: sauvage (Tailscale node IP), path: /srv/nfs/k8s-cold
# Helm chart: nfs-subdir-external-provisioner/nfs-subdir-external-provisioner
# Deploy as a separate Helm release named: nfs-provisioner-cold
nfs:
  server: 100.109.183.9
  path: /srv/nfs/k8s-cold

storageClass:
  name: nfs-cold
  provisionerName: cluster.local/nfs-cold
  defaultClass: false
  archiveOnDelete: true

replicaCount: 1
# On ks5 (OVH) NVMe pool — reaches the sauvage NFS server via its Tailscale IP
# (100.109.183.9) over the tailnet (verified: PVC binds from ks5). Was hostname:ubuntu.
nodeSelector:
  node-pool: ks5-nvme

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    memory: 128Mi
