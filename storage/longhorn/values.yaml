# Longhorn — block storage. System-managed components + replicas run on nodes
# labelled `storage-longhorn=true` (the LAN nodes ubuntu/dgx + the OVH KS-5-A
# NVMe trio), NOT on the sauvage edge. The KS-5-A pool is reserved for fast
# NVMe volumes via the longhorn-prod-nvme StorageClass (node-tag ks5-nvme +
# disk-tag nvme — see kubernetes/storage/longhorn-prod-nvme.yaml).
#
# NOTE: nodes must carry the `storage-longhorn=true` label (applied via k3s
# node-label for KS-5 in ansible/roles/k3s_control_plane, and on the LAN nodes)
# and the KS-5 Longhorn prerequisites (ansible/roles/longhorn_prereqs:
# open-iscsi, dm_crypt, multipathd disabled) or replicas cannot be scheduled.
defaultSettings:
  defaultDataPath: /var/lib/longhorn
  defaultReplicaCount: 3
  # Keep requested capacity inside the post-reservation budget. Capacity must
  # be recovered by deleting verified, unreferenced test volumes instead of by
  # weakening the 30% root-disk reservation with extra logical overcommit.
  storageOverProvisioningPercentage: 100
  storageMinimalAvailablePercentage: 15
  concurrentReplicaRebuildPerNodeLimit: 1
  guaranteedInstanceManagerCPU: 12
  systemManagedComponentsNodeSelector: "storage-longhorn:true"
  # Production volumes must never satisfy a replica count by co-locating
  # replicas on the same node. Capacity failures should therefore fail closed.
  replicaSoftAntiAffinity: false
  replicaZoneSoftAntiAffinity: true
  allowVolumeCreationWithDegradedAvailability: false
  # Backup target — will configure post-MinIO
  # backupTarget: s3://longhorn-backups@us-east-1/
  taintToleration: "dedicated=llm:NoSchedule"

persistence:
  defaultClass: true
  defaultClassReplicaCount: 3
  reclaimPolicy: Retain

# Node selector — storage nodes labelled storage-longhorn=true (excludes sauvage edge)
longhornManager:
  nodeSelector:
    storage-longhorn: "true"
  tolerations:
    - key: dedicated
      operator: Equal
      value: llm
      effect: NoSchedule

longhornDriver:
  nodeSelector:
    storage-longhorn: "true"
  tolerations:
    - key: dedicated
      operator: Equal
      value: llm
      effect: NoSchedule

longhornUI:
  replicas: 1
  nodeSelector:
    storage-longhorn: "true"

longhornAdmissionWebhook:
  nodeSelector:
    storage-longhorn: "true"

# CSI driver settings
csi:
  attacherReplicaCount: 2
  provisionerReplicaCount: 2
  resizerReplicaCount: 2
  snapshotterReplicaCount: 2

# Ingress disabled here; expose via Traefik IngressRoute later
ingress:
  enabled: false
