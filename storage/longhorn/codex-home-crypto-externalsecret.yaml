apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: longhorn-codex-home-crypto
  namespace: longhorn-system
  labels:
    app.kubernetes.io/name: longhorn-codex-home-crypto
    app.kubernetes.io/part-of: openclaw-qwen36
spec:
  # Changing the passphrase behind an existing LUKS volume makes the volume
  # unmountable. Materialize it once; rotate only through a documented LUKS
  # key-rotation/migration procedure.
  refreshPolicy: CreatedOnce
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: longhorn-codex-home-crypto
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        CRYPTO_KEY_VALUE: "{{ .cryptoKey }}"
        CRYPTO_KEY_PROVIDER: secret
        CRYPTO_KEY_CIPHER: aes-xts-plain64
        CRYPTO_KEY_HASH: sha256
        CRYPTO_KEY_SIZE: "256"
        CRYPTO_PBKDF: argon2i
  data:
    - secretKey: cryptoKey
      remoteRef:
        # vault-backend is mounted at KV v2 `secret`; this is the established
        # OpenClaw path convention already used by production ExternalSecrets.
        key: secret/openclaw-qwen36/codex-crypto
        property: CRYPTO_KEY_VALUE
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
