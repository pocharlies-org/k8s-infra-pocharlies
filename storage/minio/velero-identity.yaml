---
# Velero's AWS plugin expects a credentials file in Secret key `cloud`.
# This identity can access only the primary velero-backups bucket. The
# x86-backup-minio BackupStorageLocation keeps its separate credential.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-s3-credentials
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: velero-s3-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        cloud: |
          [default]
          aws_access_key_id={{ .accessKey }}
          aws_secret_access_key={{ .secretKey }}
  data:
    - secretKey: accessKey
      remoteRef:
        key: secret/minio/velero-s3
        property: access_key
    - secretKey: secretKey
      remoteRef:
        key: secret/minio/velero-s3
        property: secret_key
