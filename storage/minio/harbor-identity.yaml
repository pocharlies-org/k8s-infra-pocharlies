---
# Harbor S3 credentials. Values are generated outside Git, stored only in
# Vault, and projected into the Harbor namespace by External Secrets Operator.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-s3-credentials
  namespace: harbor
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-s3-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        REGISTRY_STORAGE_S3_ACCESSKEY: "{{ .accessKey }}"
        REGISTRY_STORAGE_S3_SECRETKEY: "{{ .secretKey }}"
  data:
    - secretKey: accessKey
      remoteRef:
        key: secret/minio/harbor-s3
        property: access_key
    - secretKey: secretKey
      remoteRef:
        key: secret/minio/harbor-s3
        property: secret_key
