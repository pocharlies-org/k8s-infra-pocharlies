apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: lan-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.50.240-192.168.50.250
  autoAssign: true
  avoidBuggyIPs: true
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: lan-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - lan-pool
  # RFC1918 VIPs must be announced only on nodes that are physically attached
  # to the home LAN. With externalTrafficPolicy=Cluster the announcer may
  # forward to healthy endpoints on OVH; the failed Ubuntu node is therefore
  # not a runtime dependency and another Ready LAN speaker takes over.
  nodeSelectors:
    - matchLabels:
        topology: lan
