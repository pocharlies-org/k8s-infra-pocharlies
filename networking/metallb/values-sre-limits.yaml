# SRE hygiene overlay for the live Helm release `metallb`.
# Keeps Kyverno require-resource-limits from producing recurring warning noise.
controller:
  resources:
    requests:
      cpu: 10m
      memory: 96Mi
    limits:
      memory: 256Mi

speaker:
  tolerations:
    - key: dedicated
      operator: Equal
      value: llm
      effect: NoSchedule
  resources:
    requests:
      cpu: 10m
      memory: 96Mi
    limits:
      memory: 256Mi
  frr:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 256Mi
  reloader:
    resources:
      requests:
        cpu: 5m
        memory: 16Mi
      limits:
        memory: 64Mi
  frrMetrics:
    resources:
      requests:
        cpu: 5m
        memory: 32Mi
      limits:
        memory: 128Mi
  initContainers:
    cpFrrFiles:
      resources:
        requests:
          cpu: 5m
          memory: 32Mi
        limits:
          memory: 128Mi
    cpReloader:
      resources:
        requests:
          cpu: 5m
          memory: 16Mi
        limits:
          memory: 64Mi
    cpMetrics:
      resources:
        requests:
          cpu: 5m
          memory: 16Mi
        limits:
          memory: 64Mi
