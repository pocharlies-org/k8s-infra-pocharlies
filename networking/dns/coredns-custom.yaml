---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  edani-public-lan.server: |
    e-dani.com:53 {
      errors
      # This more-specific e-dani.com server block wins over the root block.
      # Rewrite Harbor here, then resolve the service through Kubernetes while
      # preserving the original hostname in the answer for TLS/SNI.
      rewrite name exact harbor.lan.e-dani.com traefik-lan.traefik-lan.svc.cluster.local
      kubernetes cluster.local in-addr.arpa ip6.arpa {
        pods insecure
        fallthrough in-addr.arpa ip6.arpa
      }
      hosts {
        100.83.56.98 dgx.e-dani.com
        100.83.56.98 s3.e-dani.com
        ttl 60
        fallthrough
      }
      forward . /etc/resolv.conf
      cache 30
    }
