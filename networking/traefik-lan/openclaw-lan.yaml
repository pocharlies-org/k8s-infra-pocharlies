apiVersion: v1
kind: Service
metadata:
  name: openclaw-lan-host
  namespace: traefik-lan
  labels:
    app.kubernetes.io/name: openclaw-lan-host
    app.kubernetes.io/part-of: traefik-lan
spec:
  ports:
    - { name: http, port: 18789, targetPort: 18789, protocol: TCP }
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: openclaw-lan-host
  namespace: traefik-lan
  labels:
    kubernetes.io/service-name: openclaw-lan-host
    app.kubernetes.io/name: openclaw-lan-host
    app.kubernetes.io/part-of: traefik-lan
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 18789
endpoints:
  # OpenClaw Gateway (Control UI + node/agent protocol) runs on sauvage host,
  # systemd --user unit openclaw-gateway.service, listening 0.0.0.0:18789.
  # 100.109.183.9 is sauvage's Tailscale IP (same target as jarvis/openclaw-gw).
  - addresses:
      - 100.109.183.9
    conditions: {}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: lan-openclaw
  namespace: traefik-lan
spec:
  entryPoints:
    - websecure
  routes:
    # LAN / Tailscale clients reach the Control UI directly. The gateway has its
    # own app-layer auth (gateway.auth.token; controlUi.allowInsecureAuth=false,
    # satisfied by TLS termination here), so this is defence-in-depth, mirroring
    # the synapse.lan Ops UI posture.
    - kind: Rule
      match: Host(`openclaw.lan.e-dani.com`) && (ClientIP(`192.168.50.0/24`) || ClientIP(`100.64.0.0/10`) || ClientIP(`10.42.0.0/16`))
      priority: 300
      services:
        - name: openclaw-lan-host
          port: 18789
    # Everything else goes through Keycloak SSO.
    - kind: Rule
      match: Host(`openclaw.lan.e-dani.com`)
      priority: 100
      middlewares:
        - name: sso-chain
          namespace: keycloak
      services:
        - name: openclaw-lan-host
          port: 18789
  tls:
    store:
      name: default
      namespace: traefik-lan
