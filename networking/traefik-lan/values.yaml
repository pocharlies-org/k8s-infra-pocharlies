# Traefik LAN values — internal ingress, exposed via MetalLB VIP 192.168.50.240
deployment:
  replicas: 2

podDisruptionBudget:
  enabled: true
  minAvailable: 1

ingressClass:
  enabled: true
  name: traefik-lan
  isDefaultClass: true

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
    allowExternalNameServices: true
  kubernetesIngress:
    enabled: true
    allowExternalNameServices: true
    publishedService:
      enabled: true

ports:
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
    protocol: TCP
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP
    http3:
      enabled: false
  metrics:
    port: 9100
    expose:
      default: true
    exposedPort: 9100
    protocol: TCP

additionalArguments:
  # ":443" (client-facing port), NOT "websecure": the entrypoint name resolves
  # to the container port 8443, which is not reachable from LAN clients.
  - --entrypoints.web.http.redirections.entrypoint.to=:443
  - --entrypoints.web.http.redirections.entrypoint.scheme=https
  - --entrypoints.websecure.http.tls=true
  - --entrypoints.websecure.transport.respondingTimeouts.readTimeout=0
  - --entrypoints.websecure.transport.respondingTimeouts.writeTimeout=0

service:
  type: LoadBalancer
  annotations:
    metallb.io/loadBalancerIPs: 192.168.50.240
  spec:
    # The Traefik workloads run on OVH, while MetalLB advertises this RFC1918
    # VIP only from real LAN nodes. Cluster policy lets those announcers route
    # traffic across the CNI to the HA OVH endpoints without requiring an
    # ingress pod on the home-lab Ubuntu host.
    externalTrafficPolicy: Cluster

# Dashboard — internal only, will protect with SSO later
ingressRoute:
  dashboard:
    enabled: false   # enable later behind Keycloak

logs:
  access:
    enabled: true
    format: json
  general:
    level: INFO

metrics:
  prometheus:
    entryPoint: metrics

# Allow some resilience
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

# Keep the ingress control plane available when the home-lab Ubuntu node is
# offline. In-cluster callers resolve the LAN hostname to this Service through
# the CoreDNS rewrite below; the MetalLB address remains only a legacy LAN
# entrypoint and is not an availability dependency for cluster workloads.
nodeSelector:
  kubernetes.io/arch: amd64
  node-pool: ks5-nvme

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/instance: traefik-lan-traefik-lan
            app.kubernetes.io/name: traefik
        topologyKey: kubernetes.io/hostname
