# Traefik LAN values — internal ingress, exposed via MetalLB VIP 192.168.50.240
deployment:
  # Two OVH endpoints keep in-cluster traffic independent of the home LAN;
  # two non-Ubuntu LAN endpoints preserve the MetalLB VIP and client IPs.
  replicas: 4

podDisruptionBudget:
  enabled: true
  minAvailable: 3

ingressClass:
  enabled: true
  name: traefik-lan
  isDefaultClass: true

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
    allowExternalNameServices: true
  kubernetesIngress:
    enabled: true
    allowExternalNameServices: true
    publishedService:
      enabled: true

ports:
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
    protocol: TCP
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP
    http3:
      enabled: false
  metrics:
    port: 9100
    expose:
      default: false
    exposedPort: 9100
    protocol: TCP

additionalArguments:
  # ":443" (client-facing port), NOT "websecure": the entrypoint name resolves
  # to the container port 8443, which is not reachable from LAN clients.
  - --entrypoints.web.http.redirections.entrypoint.to=:443
  - --entrypoints.web.http.redirections.entrypoint.scheme=https
  - --entrypoints.websecure.http.tls=true
  - --entrypoints.websecure.transport.respondingTimeouts.readTimeout=0
  - --entrypoints.websecure.transport.respondingTimeouts.writeTimeout=0

service:
  type: LoadBalancer
  annotations:
    metallb.io/loadBalancerIPs: 192.168.50.240
  spec:
    # MetalLB routes the VIP directly; the backing NodePorts are unnecessary.
    allocateLoadBalancerNodePorts: false
    # Preserve the original client address: several LAN routes use ClientIP()
    # authorization. MetalLB advertises only from Ready LAN nodes that have a
    # local endpoint, while cluster callers use the Service and can reach OVH.
    externalTrafficPolicy: Local

# Dashboard — internal only, will protect with SSO later
ingressRoute:
  dashboard:
    enabled: false   # enable later behind Keycloak

logs:
  access:
    enabled: true
    format: json
  general:
    level: INFO

metrics:
  prometheus:
    entryPoint: metrics
    # Chart 40.2.0 renders this as a dedicated ClusterIP Service.
    service:
      enabled: true

# Allow some resilience
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        # OVH endpoints keep cluster-internal Harbor/release traffic alive even
        # if the whole physical LAN disappears.
        - matchExpressions:
            - key: node-pool
              operator: In
              values: [ks5-nvme]
        # LAN endpoints preserve source IP and the RFC1918 VIP. Never schedule
        # on the failed home-lab Ubuntu node.
        - matchExpressions:
            - key: topology
              operator: In
              values: [lan]
            - key: kubernetes.io/hostname
              operator: NotIn
              values: [ubuntu]
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/instance: traefik-lan-traefik-lan
            app.kubernetes.io/name: traefik
        topologyKey: kubernetes.io/hostname

# The only two healthy physical-LAN nodes are dedicated GPU nodes. Traefik uses
# no GPU and its bounded 100m/128Mi request is intentionally tolerated so the
# LAN ingress does not fall back to the failed Ubuntu machine.
tolerations:
  - key: dedicated
    operator: Equal
    value: llm
    effect: NoSchedule

# With four replicas and two eligible failure domains this yields 2 LAN + 2 OVH
# endpoints. Required hostname anti-affinity keeps every replica on a distinct
# server; a failed domain still leaves the other domain serving cluster traffic.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology
    whenUnsatisfiable: DoNotSchedule
    nodeAffinityPolicy: Honor
    nodeTaintsPolicy: Honor
    labelSelector:
      matchLabels:
        app.kubernetes.io/instance: traefik-lan-traefik-lan
        app.kubernetes.io/name: traefik
