---
# Public edge route for SerpienteTool (Snake game with AI autopilot).
# Cloudflare → traefik-edge → serpientetool services (namespace: serpientetool).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: edge-serpientetool-public
  namespace: traefik-edge
  annotations:
    external-dns.alpha.kubernetes.io/hostname: serpientetool.e-dani.com
    external-dns.alpha.kubernetes.io/target: 141.94.73.52,141.94.73.50,145.239.194.168,57.129.17.172
    external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
spec:
  entryPoints:
    - websecure
  ingressClassName: traefik-edge
  routes:
    # API routes → backend
    - kind: Rule
      match: Host(`serpientetool.e-dani.com`) && PathPrefix(`/api`)
      priority: 100
      services:
        - name: serpientetool-backend
          namespace: serpientetool
          port: 8000
    # WebSocket autopilot → backend
    - kind: Rule
      match: Host(`serpientetool.e-dani.com`) && PathPrefix(`/ws`)
      priority: 100
      services:
        - name: serpientetool-backend
          namespace: serpientetool
          port: 8000
    # Everything else → frontend SPA
    - kind: Rule
      match: Host(`serpientetool.e-dani.com`)
      priority: 50
      services:
        - name: serpientetool-frontend
          namespace: serpientetool
          port: 80
  tls:
    store:
      name: default
      namespace: traefik-edge
