apiVersion: v1
kind: ConfigMap
metadata:
  name: firecrawl-edge-auth
  namespace: traefik-edge
  labels:
    app.kubernetes.io/name: firecrawl-edge-auth
    app.kubernetes.io/part-of: traefik-edge-cutover
data:
  auth.py: |
    import json
    import os
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    expected = os.environ["EXPECTED_AUTHORIZATION"]

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            self._check()

        def do_POST(self):
            self._check()

        def do_PUT(self):
            self._check()

        def do_PATCH(self):
            self._check()

        def do_DELETE(self):
            self._check()

        def _check(self):
            if self.path.startswith("/health"):
                self.send_response(200)
                self.end_headers()
                self.wfile.write(b"ok")
                return

            if self.headers.get("Authorization") == expected:
                self.send_response(200)
                self.end_headers()
                self.wfile.write(b"ok")
                return

            body = json.dumps({"error": "Unauthorized. Provide Authorization: Bearer <api-key>"}).encode()
            self.send_response(401)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, fmt, *args):
            return

    ThreadingHTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firecrawl-edge-auth
  namespace: traefik-edge
  labels:
    app.kubernetes.io/name: firecrawl-edge-auth
    app.kubernetes.io/part-of: traefik-edge-cutover
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: firecrawl-edge-auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: firecrawl-edge-auth
        app.kubernetes.io/part-of: traefik-edge-cutover
    spec:
      nodeSelector:
        role: edge
        topology: remote
      tolerations:
        - key: role
          operator: Equal
          value: edge
          effect: NoSchedule
      containers:
        - name: auth
          image: docker.io/library/python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/auth.py"]
          env:
            - name: EXPECTED_AUTHORIZATION
              valueFrom:
                secretKeyRef:
                  name: firecrawl-edge-auth
                  key: expected-authorization
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 96Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - { name: app, mountPath: /app, readOnly: true }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: app
          configMap:
            name: firecrawl-edge-auth
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: firecrawl-edge-auth
  namespace: traefik-edge
  labels:
    app.kubernetes.io/name: firecrawl-edge-auth
    app.kubernetes.io/part-of: traefik-edge-cutover
spec:
  selector:
    app.kubernetes.io/name: firecrawl-edge-auth
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: firecrawl-edge-auth
  namespace: traefik-edge
spec:
  forwardAuth:
    address: http://firecrawl-edge-auth.traefik-edge.svc.cluster.local:8080/
    trustForwardHeader: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: firecrawl-public-authenticated
  namespace: traefik-edge
spec:
  entryPoints:
    - websecure
  ingressClassName: traefik-edge
  routes:
    - kind: Rule
      match: Host(`firecrawl.e-dani.com`) && Path(`/health`)
      priority: 2000
      services:
        - name: firecrawl-edge-auth
          port: 8080
    - kind: Rule
      match: Host(`firecrawl.e-dani.com`)
      priority: 1000
      middlewares:
        - name: firecrawl-edge-auth
      services:
        - name: firecrawl-api
          namespace: skirmshop
          port: 3002
  tls:
    store:
      name: default
      namespace: traefik-edge
