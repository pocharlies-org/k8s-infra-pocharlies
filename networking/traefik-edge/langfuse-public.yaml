---
# Public edge route for the Langfuse UI (LLM observability).
# Cloudflare → traefik-edge → langfuse-web (namespace: langfuse).
# Auth is handled by Langfuse's OWN Keycloak OIDC login (realm edani) — no oauth2-proxy
# ForwardAuth here, so there is a single sign-on (removed the redundant sso-chain that
# caused a double login). The /api/public/* ingestion endpoints remain pk/sk key-authed.
#
# The traefik-edge DaemonSet only watches an explicit namespace allowlist (and resolves
# backend services only within it), and `langfuse` is intentionally NOT added to avoid a
# gated DaemonSet restart. Instead we expose langfuse-web via an ExternalName Service in
# the (watched) traefik-edge namespace — enabled by `allowExternalNameServices: true` on
# the edge providers — so the route resolves without watching the langfuse namespace.
apiVersion: v1
kind: Service
metadata:
  name: langfuse-web-ext
  namespace: traefik-edge
spec:
  type: ExternalName
  externalName: langfuse-web.langfuse.svc.cluster.local
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: edge-langfuse-public
  namespace: traefik-edge
  annotations:
    external-dns.alpha.kubernetes.io/hostname: langfuse.e-dani.com
    external-dns.alpha.kubernetes.io/target: 141.94.73.52,141.94.73.50,145.239.194.168,57.129.17.172
    external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
spec:
  entryPoints:
    - websecure
  ingressClassName: traefik-edge
  routes:
    - kind: Rule
      match: Host(`langfuse.e-dani.com`)
      services:
        - name: langfuse-web-ext
          port: 3000
  tls:
    store:
      name: default
      namespace: traefik-edge
