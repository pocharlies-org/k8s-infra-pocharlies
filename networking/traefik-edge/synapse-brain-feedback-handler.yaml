apiVersion: v1
kind: ConfigMap
metadata:
  name: synapse-brain-feedback-handler
  namespace: traefik-edge
  labels:
    app.kubernetes.io/name: synapse-brain-feedback-handler
    app.kubernetes.io/part-of: synapse
data:
  handler.py: |
    from __future__ import annotations

    import hashlib
    import hmac
    import json
    import os
    import time
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    MAX_BODY_BYTES = int(os.getenv("MAX_BODY_BYTES", "1048576"))
    DATA_DIR = os.getenv("DATA_DIR", "/data")
    EVENTS_PATH = os.path.join(DATA_DIR, "events.jsonl")
    RERANK_SIGNALS_PATH = os.path.join(DATA_DIR, "rerank-signals.jsonl")
    LATEST_SIGNAL_PATH = os.path.join(DATA_DIR, "latest-rerank-signal.json")
    TOKEN_HEADER = "X-Synapse-Brain-Token"


    def _write_jsonl(path: str, record: dict) -> None:
        os.makedirs(os.path.dirname(path), exist_ok=True)
        line = json.dumps(record, sort_keys=True, separators=(",", ":"))
        with open(path, "a", encoding="utf-8") as fh:
            fh.write(line + "\n")


    def _write_json(path: str, record: dict) -> None:
        os.makedirs(os.path.dirname(path), exist_ok=True)
        tmp_path = path + ".tmp"
        with open(tmp_path, "w", encoding="utf-8") as fh:
            json.dump(record, fh, sort_keys=True, indent=2)
            fh.write("\n")
        os.replace(tmp_path, path)


    def _metadata(payload: dict) -> dict:
        metadata = payload.get("metadata") or {}
        return metadata if isinstance(metadata, dict) else {}


    def _rerank_eligible(payload: dict) -> bool:
        metadata = _metadata(payload)
        if metadata.get("diagnostic_only") is True:
            return False
        if metadata.get("rerank_eligible") is False:
            return False
        return True


    def _ranked_results(payload: dict) -> list[dict]:
        if not _rerank_eligible(payload):
            return []
        results = payload.get("ranked_results") or []
        if not isinstance(results, list):
            return []
        out = []
        for item in results[:100]:
            if not isinstance(item, dict):
                continue
            usefulness = item.get("usefulness")
            try:
                usefulness_score = int(usefulness)
            except (TypeError, ValueError):
                usefulness_score = 0
            if usefulness_score >= 4 and item.get("used"):
                action = "boost_for_similar_queries"
            elif usefulness_score <= 1:
                action = "downrank_or_suppress"
            else:
                action = "observe"
            out.append({
                "result_id": item.get("result_id"),
                "source_id": item.get("source_id"),
                "displayed_rank": item.get("displayed_rank"),
                "feedback_rank": item.get("feedback_rank"),
                "usefulness": usefulness_score,
                "used": bool(item.get("used")),
                "rerank_action": action,
            })
        return out


    def _learning_signal(payload: dict) -> dict:
        usefulness = payload.get("overall_usefulness")
        try:
            usefulness_score = int(usefulness)
        except (TypeError, ValueError):
            usefulness_score = 0
        misleading = payload.get("misleading_source_ids") or []
        missing_information = str(payload.get("missing_information") or "").strip()
        action_taken = str(payload.get("action_taken") or "")
        if not _rerank_eligible(payload):
            recommended_action = "observe_diagnostic_feedback"
        elif misleading or usefulness_score <= 1 or action_taken == "failed":
            recommended_action = "review_and_downrank_bad_sources"
        elif missing_information:
            recommended_action = "expand_context_for_similar_requests"
        elif usefulness_score >= 4:
            recommended_action = "boost_used_sources_for_similar_requests"
        else:
            recommended_action = "observe_more_feedback"
        return {
            "recommended_action": recommended_action,
            "overall_usefulness": usefulness_score,
            "confidence": payload.get("confidence"),
            "has_missing_information": bool(missing_information),
            "misleading_source_count": len(misleading) if isinstance(misleading, list) else 0,
            "rerank_eligible": _rerank_eligible(payload),
            "promotion_guardrail": "neuron_promotion_disabled_until_reviewed_gate",
        }


    def _auth_failure(headers) -> tuple[int, dict] | None:
        expected_token = os.getenv("SYNAPSE_BRAIN_FEEDBACK_TOKEN", "").strip()
        if not expected_token:
            return 503, {"detail": "Synapse Brain feedback token is not configured"}
        provided_token = str(headers.get(TOKEN_HEADER) or "")
        if not provided_token:
            return 401, {"detail": "Missing Synapse Brain feedback token"}
        if not hmac.compare_digest(provided_token, expected_token):
            return 401, {"detail": "Invalid Synapse Brain feedback token"}
        return None


    class Handler(BaseHTTPRequestHandler):
        server_version = "synapse-brain-feedback/1.0"

        def log_message(self, fmt: str, *args) -> None:
            print(json.dumps({
                "event": "access",
                "path": self.path,
                "client": self.client_address[0],
                "message": fmt % args,
            }), flush=True)

        def _json(self, status: int, payload: dict) -> None:
            body = json.dumps(payload, separators=(",", ":")).encode("utf-8")
            self.send_response(status)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self) -> None:
            if self.path == "/healthz":
                self._json(200, {"status": "ok"})
                return
            self._json(404, {"detail": "Not Found"})

        def do_POST(self) -> None:
            if self.path != "/webhooks/brain-feedback":
                self._json(404, {"detail": "Not Found"})
                return

            auth_failure = _auth_failure(self.headers)
            if auth_failure is not None:
                status, payload = auth_failure
                self._json(status, payload)
                return

            try:
                length = int(self.headers.get("Content-Length") or "0")
            except ValueError:
                self._json(411, {"detail": "Invalid Content-Length"})
                return
            if length <= 0:
                self._json(400, {"detail": "Empty body"})
                return
            if length > MAX_BODY_BYTES:
                self._json(413, {"detail": "Body too large"})
                return

            raw = self.rfile.read(length)
            try:
                payload = json.loads(raw)
            except json.JSONDecodeError:
                self._json(400, {"detail": "Invalid JSON"})
                return

            event_id = str(payload.get("search_event_id") or "")
            instance_id = str(payload.get("instance_id") or "")
            tool_name = str(payload.get("tool_name") or "")
            if not event_id or not instance_id or not tool_name:
                self._json(422, {"detail": "search_event_id, instance_id and tool_name are required"})
                return

            digest = hashlib.sha256(raw).hexdigest()
            learning_signal = _learning_signal(payload)
            rerank_candidates = _ranked_results(payload)
            rerank_signal = {
                "event": "brain.feedback.rerank_signal",
                "received_at": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
                "search_event_id": event_id,
                "instance_id": instance_id,
                "tool_name": tool_name,
                "consumer": payload.get("consumer"),
                "query_hash": payload.get("query_hash"),
                "query_preview": payload.get("query_preview"),
                "overall_usefulness": payload.get("overall_usefulness"),
                "promotion_mode": payload.get("promotion_mode"),
                "learning_signal": learning_signal,
                "rerank_candidates": rerank_candidates,
                "ranked_result_count": len(payload.get("ranked_results") or []),
                "metadata": _metadata(payload),
                "payload_sha256": digest,
                "token_present": bool(self.headers.get(TOKEN_HEADER)),
                "token_valid": True,
                "reranking_queue": "synapse.brain_feedback",
            }
            event_record = {
                "event": "brain.feedback.received",
                "received_at": rerank_signal["received_at"],
                "search_event_id": event_id,
                "instance_id": instance_id,
                "tool_name": tool_name,
                "payload_sha256": digest,
                "reranking_queue": "synapse.brain_feedback",
            }
            _write_jsonl(EVENTS_PATH, event_record)
            _write_jsonl(RERANK_SIGNALS_PATH, rerank_signal)
            _write_json(LATEST_SIGNAL_PATH, rerank_signal)
            print(json.dumps(rerank_signal, sort_keys=True), flush=True)
            self._json(202, {
                "status": "accepted",
                "event_type": "brain.feedback.rerank_signal",
                "search_event_id": event_id,
                "reranking_queue": "synapse.brain_feedback",
                "recommended_action": learning_signal["recommended_action"],
                "learning_signal": learning_signal,
                "promotion_mode": payload.get("promotion_mode"),
                "candidate_count": 0,
                "queue_recorded": True,
            })


    if __name__ == "__main__":
        port = int(os.getenv("PORT", "8080"))
        ThreadingHTTPServer(("0.0.0.0", port), Handler).serve_forever()
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: synapse-brain-feedback-token
  namespace: traefik-edge
  labels:
    app.kubernetes.io/name: synapse-brain-feedback-handler
    app.kubernetes.io/part-of: synapse
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: synapse-brain-feedback-token
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        SYNAPSE_BRAIN_FEEDBACK_TOKEN: "{{ .dashboard_api_key }}"
  data:
    - secretKey: dashboard_api_key
      remoteRef:
        key: skirmshop-brain/prod/app
        property: dashboard_api_key
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapse-brain-feedback-handler
  namespace: traefik-edge
  labels:
        app.kubernetes.io/name: synapse-brain-feedback-handler
        app.kubernetes.io/part-of: synapse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: synapse-brain-feedback-handler
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: synapse-brain-feedback-handler
        app.kubernetes.io/part-of: synapse
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: handler
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/handler.py"]
          env:
            - name: DATA_DIR
              value: /data
            - name: SYNAPSE_BRAIN_FEEDBACK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: synapse-brain-feedback-token
                  key: SYNAPSE_BRAIN_FEEDBACK_TOKEN
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: handler
              mountPath: /app
              readOnly: true
            - name: queue
              mountPath: /data
      volumes:
        - name: handler
          configMap:
            name: synapse-brain-feedback-handler
        - name: queue
          persistentVolumeClaim:
            claimName: synapse-brain-feedback-queue
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: synapse-brain-feedback-queue
  namespace: traefik-edge
  labels:
    app.kubernetes.io/name: synapse-brain-feedback-handler
    app.kubernetes.io/part-of: synapse
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: synapse-brain-feedback-handler
  namespace: traefik-edge
  labels:
    app.kubernetes.io/name: synapse-brain-feedback-handler
    app.kubernetes.io/part-of: synapse
spec:
  selector:
    app.kubernetes.io/name: synapse-brain-feedback-handler
  ports:
    - name: http
      port: 8080
      targetPort: http
