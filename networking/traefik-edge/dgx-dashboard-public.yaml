---
# Public edge route for the DGX Control Nexus dashboard.
# Cloudflare → traefik-edge (Keycloak SSO via sso-chain@keycloak) →
# Service dgx-dashboard-ui.control-nexus:80 (nginx UI pod) → host backend.
# Replaces the old docker api-gateway + oauth2-proxy path (home IP 83.46.66.146).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: edge-dgx-dashboard-public
  namespace: traefik-edge
  annotations:
    external-dns.alpha.kubernetes.io/hostname: dgx.e-dani.com
    external-dns.alpha.kubernetes.io/target: 141.94.73.52,141.94.73.50,145.239.194.168,57.129.17.172
    external-dns.alpha.kubernetes.io/cloudflare-proxied: 'true'
spec:
  entryPoints:
    - websecure
  ingressClassName: traefik-edge
  routes:
    - kind: Rule
      match: Host(`dgx.e-dani.com`) && (ClientIP(`192.168.50.0/24`) || ClientIP(`100.64.0.0/10`) || ClientIP(`10.42.0.0/16`) || ClientIP(`10.43.0.0/16`))
      priority: 200
      services:
        - name: dgx-dashboard-ui
          namespace: control-nexus
          port: 80
    - kind: Rule
      match: Host(`dgx.e-dani.com`)
      priority: 100
      middlewares:
        - name: sso-chain
          namespace: keycloak
      services:
        - name: dgx-dashboard-ui
          namespace: control-nexus
          port: 80
  tls:
    store:
      name: default
      namespace: traefik-edge
