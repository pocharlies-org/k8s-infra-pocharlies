---
# Synapse host stack roles — migrated from docker shared-postgres to CNPG.
# Passwords generated 2026-06-08 with `openssl rand -base64 64 | tr -dc 'A-Za-z0-9' | head -c 32`
# (URI-safe charset: no /+= that break libpq URI). Stored in Vault `secret/synapse-postgres/<role>`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: synapse-app-db-credentials
  namespace: databases
  labels:
    app.kubernetes.io/part-of: shared-infrastructure
    app.kubernetes.io/component: postgres-role
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: synapse-app-db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: secret/synapse-postgres/synapse_app
        property: DB_USER
    - secretKey: password
      remoteRef:
        key: secret/synapse-postgres/synapse_app
        property: DB_PASSWORD
---
