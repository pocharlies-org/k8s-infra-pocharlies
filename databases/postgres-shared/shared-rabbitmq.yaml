apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rabbitmq-secrets
  namespace: databases
  labels:
    app.kubernetes.io/part-of: shared-infrastructure
    app.kubernetes.io/component: shared-rabbitmq
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: rabbitmq-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: RABBITMQ_DEFAULT_USER
      remoteRef:
        key: secret/skirmshop/rabbitmq
        property: user
    - secretKey: RABBITMQ_DEFAULT_PASS
      remoteRef:
        key: secret/skirmshop/rabbitmq
        property: password
---
# Erlang cookie shared by all cluster members.
# Generated via `openssl rand -hex 32` on 2026-05-30 during the HA refactor.
# Rotation: requires synchronized restart of all 3 pods.
apiVersion: v1
kind: Secret
metadata:
  name: shared-rabbitmq-erlang-cookie
  namespace: databases
  labels:
    app.kubernetes.io/part-of: shared-infrastructure
    app.kubernetes.io/component: shared-rabbitmq
type: Opaque
stringData:
  RABBITMQ_ERLANG_COOKIE: 2d991f6bc79563bc4ce38bd80195925dd89ccf7fd93c1b639a1b1fc04a953d48
---
# RBAC for rabbitmq_peer_discovery_k8s plugin.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: shared-rabbitmq
  namespace: databases
  labels:
    app.kubernetes.io/part-of: shared-infrastructure
    app.kubernetes.io/component: shared-rabbitmq
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shared-rabbitmq-peer-discovery
  namespace: databases
  labels:
    app.kubernetes.io/part-of: shared-infrastructure
    app.kubernetes.io/component: shared-rabbitmq
rules:
  - apiGroups: [""]
    resources: ["endpoints", "services", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shared-rabbitmq-peer-discovery
  namespace: databases
  labels:
    app.kubernetes.io/part-of: shared-infrastructure
    app.kubernetes.io/component: shared-rabbitmq
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: shared-rabbitmq-peer-discovery
subjects:
  - kind: ServiceAccount
    name: shared-rabbitmq
    namespace: databases
---
# Memory + disk watermark config (PR #9 — kept intact).
apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-rabbitmq-tuning
  namespace: databases
  labels:
    app.kubernetes.io/part-of: shared-infrastructure
    app.kubernetes.io/component: shared-rabbitmq
data:
  20-tuning.conf: |
    # 2026-06-04: raised 700MB -> 1200MB (~60% of the 2Gi cgroup limit). 700MB was
    # too low: the quorum-queue ETS baseline alone is ~0.41GB, so the broker sat at
    # ~94% of the watermark and any webhook burst tipped it over -> publishers
    # blocked -> synapse gateway webhook read-timeouts (broke the Telegram Apply
    # button). 1200MB leaves working room above the baseline + buffer to the limit.
    # 2026-06-15: 1200MB -> 1800MB (limit 2Gi -> 3Gi) for the Synapse broker
    # migration: the /synapse fabric (445 queues + DLX/delayed) moves here from the
    # sauvage docker broker. Real usage today is ~0.48GB, but a stuck-consumer backlog
    # (the 14:33 outage on the docker broker) needs headroom; ~1.4GB stays above the
    # watermark for the broker to flush before OOM. NB: RAM is NOT the real fix —
    # delivery-limit (quorum, phase-2) + the backlog alert below are.
    vm_memory_high_watermark.absolute = 1800MB
    disk_free_limit.absolute = 500MB
---
# enabled_plugins + cluster formation config for the 3-replica HA cluster.
apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-rabbitmq-config
  namespace: databases
  labels:
    app.kubernetes.io/part-of: shared-infrastructure
    app.kubernetes.io/component: shared-rabbitmq
data:
  enabled_plugins: |
    [rabbitmq_peer_discovery_k8s,rabbitmq_management,rabbitmq_prometheus,rabbitmq_delayed_message_exchange].
  rabbitmq.conf: |
    cluster_formation.peer_discovery_backend = k8s
    cluster_formation.k8s.host = kubernetes.default.svc.cluster.local
    cluster_formation.k8s.address_type = hostname
    cluster_formation.k8s.service_name = shared-rabbitmq-headless
    cluster_formation.k8s.hostname_suffix = .shared-rabbitmq-headless.databases.svc.cluster.local
    cluster_partition_handling = pause_minority
    queue_master_locator = min-masters
    loopback_users.guest = false
    log.console = true
---
apiVersion: v1
kind: Service
metadata:
  name: shared-rabbitmq-headless
  namespace: databases
  labels:
    app.kubernetes.io/part-of: shared-infrastructure
    app.kubernetes.io/component: shared-rabbitmq
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: shared-rabbitmq
  ports:
    - { name: amqp,       port: 5672,  targetPort: 5672  }
    - { name: mgmt,       port: 15672, targetPort: 15672 }
    - { name: epmd,       port: 4369,  targetPort: 4369  }
    - { name: dist,       port: 25672, targetPort: 25672 }
    - { name: prometheus, port: 15692, targetPort: 15692 }
---
apiVersion: v1
kind: Service
metadata:
  name: shared-rabbitmq
  namespace: databases
  labels:
    app.kubernetes.io/part-of: shared-infrastructure
    app.kubernetes.io/component: shared-rabbitmq
spec:
  selector:
    app: shared-rabbitmq
  ports:
    - { name: amqp,       port: 5672,  targetPort: 5672  }
    - { name: mgmt,       port: 15672, targetPort: 15672 }
    - { name: prometheus, port: 15692, targetPort: 15692 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: shared-rabbitmq
  namespace: databases
  labels:
    app.kubernetes.io/part-of: shared-infrastructure
    app.kubernetes.io/component: shared-rabbitmq
spec:
  serviceName: shared-rabbitmq-headless
  replicas: 3
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: shared-rabbitmq
  template:
    metadata:
      labels:
        app: shared-rabbitmq
    spec:
      enableServiceLinks: false
      serviceAccountName: shared-rabbitmq
      terminationGracePeriodSeconds: 60
      nodeSelector:
        kubernetes.io/arch: amd64
      affinity:
        podAntiAffinity:
          # required: with cluster_partition_handling=pause_minority, 2-of-3 nodes
          # co-located on a failed host leaves the survivor a paused minority —
          # whole broker down. One replica per node is a hard constraint.
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: shared-rabbitmq
              topologyKey: kubernetes.io/hostname
      containers:
        - name: rabbitmq
          # 2026-06-15: rabbitmq:3.13.7-management + rabbitmq_delayed_message_exchange
          # (v3.13.0) + federation, baked in build/Dockerfile.rabbitmq. Required because
          # the Synapse /synapse topology declares exchange `delayed` (x-delayed-message),
          # absent from the stock image. Use the harbor.e-dani.com hostname (NOT harbor.lan
          # 192.168.50.240, which the OVH ks5 nodes can't route).
          image: harbor.e-dani.com/homelab/shared-rabbitmq:3.13.7-dme
          ports:
            - { name: amqp,       containerPort: 5672  }
            - { name: mgmt,       containerPort: 15672 }
            - { name: epmd,       containerPort: 4369  }
            - { name: dist,       containerPort: 25672 }
            - { name: prometheus, containerPort: 15692 }
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: RABBITMQ_USE_LONGNAME
              value: "true"
            - name: RABBITMQ_NODENAME
              value: "rabbit@$(POD_NAME).shared-rabbitmq-headless.$(POD_NAMESPACE).svc.cluster.local"
          envFrom:
            - secretRef: { name: rabbitmq-secrets }
            - secretRef: { name: shared-rabbitmq-erlang-cookie }
          volumeMounts:
            - { name: data,   mountPath: /var/lib/rabbitmq }
            - { name: config, mountPath: /etc/rabbitmq/enabled_plugins, subPath: enabled_plugins, readOnly: true }
            - { name: config, mountPath: /etc/rabbitmq/rabbitmq.conf,    subPath: rabbitmq.conf,    readOnly: true }
            - { name: tuning, mountPath: /etc/rabbitmq/conf.d/20-tuning.conf, subPath: 20-tuning.conf, readOnly: true }
          resources:
            requests: { cpu: 100m, memory: 512Mi }
            limits:   { memory: 3Gi }
          readinessProbe:
            exec: { command: [rabbitmq-diagnostics, -q, ping] }
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
          livenessProbe:
            exec: { command: [rabbitmq-diagnostics, -q, ping] }
            initialDelaySeconds: 120
            periodSeconds: 60
            timeoutSeconds: 15
            failureThreshold: 3
      volumes:
        - { name: config, configMap: { name: shared-rabbitmq-config } }
        - name: tuning
          configMap:
            name: shared-rabbitmq-tuning
            items:
              - { key: 20-tuning.conf, path: 20-tuning.conf }
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/part-of: shared-infrastructure
          app.kubernetes.io/component: shared-rabbitmq
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn
        resources:
          requests:
            storage: 10Gi
