apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-shared
  namespace: databases
  annotations:
    # Bump only by PR after the corresponding ExternalSecrets are healthy.
    # This makes CNPG re-read passwordSecret when a role was first observed
    # before ESO had materialized its Secret.
    synapse.e-dani.com/agent-role-credentials-generation: "2"
  labels:
    app.kubernetes.io/part-of: shared-infrastructure
    app.kubernetes.io/component: postgres
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5
  primaryUpdateStrategy: unsupervised
  primaryUpdateMethod: switchover
  enableSuperuserAccess: true

  postgresql:
    parameters:
      # Resized 2026-06-08 for synapse-stack migration from docker shared-postgres
      # (see plans/shared-stores-migration-from-sauvage.md §1.1).
      # 41 synapse services × pool_size 5 = 205 connections projected; max_connections 400 = ×1.95 headroom.
      # shared_buffers 1Gi (12.5% of 8Gi mem limit) absorbs litellm full-scan working set
      # which was OOM-killing pod with 256MB / 2Gi (root cause documented in plan §12.2).
      max_connections: "400"
      shared_buffers: "1GB"
      effective_cache_size: "4GB"
      work_mem: "32MB"
      maintenance_work_mem: "256MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "32MB"
      default_statistics_target: "100"
      log_statement: "ddl"
      log_min_duration_statement: "1000"
      # Logical replication prerequisites (Fase 2 of synapse-stack migration).
      # max_replication_slots kept at upstream CNPG default (32) to avoid regression;
      # max_wal_senders bumped from default 10 to 20 to cover 7 synapse role PUBLICATIONs
      # + walreceivers (replica + barman archive) with headroom.
      wal_level: "logical"
      max_wal_senders: "20"
      max_replication_slots: "32"

  storage:
    storageClass: longhorn
    size: 80Gi

  walStorage:
    storageClass: longhorn
    size: 20Gi

  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

  monitoring:
    enablePodMonitor: false

  managed:
    roles:
      - name: n8n
        ensure: present
        login: true
        passwordSecret:
          name: n8n-db-credentials
        comment: "n8n workflow automation (repo: pocharlies/k8s-n8n-pocharlies)"
      - name: n8n_stg
        ensure: present
        login: true
        passwordSecret:
          name: n8n-stg-db-credentials
        comment: "n8n staging workflow automation"
      - name: litellm
        ensure: present
        login: true
        passwordSecret:
          name: litellm-db-credentials
        comment: "LiteLLM router (repo: pocharlies/k8s-litellm-pocharlies)"
      - name: langfuse
        ensure: present
        login: true
        passwordSecret:
          name: langfuse-db-credentials
        comment: "Langfuse LLM observability (repo: pocharlies-org/k8s-langfuse-pocharlies)"
      - name: teslamate
        ensure: present
        login: true
        passwordSecret:
          name: teslamate-db-credentials
        comment: "TeslaMate (repo: pocharlies/k8s-teslamate-pocharlies)"
      - name: whatsappmcp
        ensure: present
        login: true
        passwordSecret:
          name: whatsappmcp-db-credentials
        comment: "WhatsApp MCP/socialmedia (repo: pocharlies/k8s-socialmedia-pocharlies)"
      - name: skirmshop
        ensure: present
        login: true
        passwordSecret:
          name: skirmshop-db-credentials
        comment: "SkirmShop shared apps and labels (shopify-* repos)"
      # Synapse host stack (41 services in sauvage), migrated from docker shared-postgres
      # to CNPG (2026-06-08). Mirrors the role topology in docker: synapse_app is a NOLOGIN
      # group; the 6 login roles inherit from it. synapse_engine + synapse_admin BYPASSRLS.
      # See plans/shared-stores-migration-from-sauvage.md §1.4 and §-1.11D.
      - name: synapse_app
        ensure: present
        login: false
        inherit: true
        passwordSecret:
          name: synapse-app-db-credentials
        comment: "Synapse shared group role (NOLOGIN); members inherit table privileges via this role"
      - name: synapse_engine
        ensure: present
        login: true
        inherit: true
        bypassrls: true
        inRoles:
          - synapse_app
        passwordSecret:
          name: synapse-engine-db-credentials
        comment: "Synapse Workflow Engine (synapse-engine.service on sauvage)"
      - name: synapse_dispatcher
        ensure: present
        login: true
        inherit: true
        inRoles:
          - synapse_app
        passwordSecret:
          name: synapse-dispatcher-db-credentials
        comment: "Synapse Dispatcher (outbox → RMQ) — synapse-dispatcher.service"
      - name: synapse_gateway
        ensure: present
        login: true
        inherit: true
        inRoles:
          - synapse_app
        passwordSecret:
          name: synapse-gateway-db-credentials
        comment: "Synapse HTTP gateway (synapse-gateway.service)"
      - name: synapse_admin
        ensure: present
        login: true
        inherit: true
        bypassrls: true
        passwordSecret:
          name: synapse-admin-db-credentials
        comment: "Synapse Admin UI (synapse-admin.service); BYPASSRLS for cross-tenant operations"
      - name: synapse_adapter
        ensure: present
        login: true
        inherit: true
        inRoles:
          - synapse_app
        passwordSecret:
          name: synapse-adapter-db-credentials
        comment: "Synapse Adapters (shared role for 35 synapse-adapter-* services)"
      - name: synapse_outbox_gc
        ensure: present
        login: true
        inherit: true
        inRoles:
          - synapse_app
        passwordSecret:
          name: synapse-outbox-gc-db-credentials
        comment: "Synapse Outbox GC (synapse-outbox-gc.service; hourly oneshot timer)"
      # Dedicated agent identities deliberately do not inherit synapse_app.
      # Synapse migrations grant only the table/column privileges each plane needs.
      - name: synapse_sre_m2m
        ensure: present
        login: true
        inherit: false
        passwordSecret:
          name: synapse-sre-m2m-db-credentials
        comment: "Private Synapse SRE AgentGateway mutation plane"
      - name: synapse_sre_reporter
        ensure: present
        login: true
        inherit: false
        passwordSecret:
          name: synapse-sre-reporter-db-credentials
        comment: "Read-mostly weekly Synapse SRE reporter"
      - name: synapse_agent_m2m
        ensure: present
        login: true
        inherit: false
        passwordSecret:
          name: synapse-agent-m2m-db-credentials
        comment: "Private durable Synapse agent-run callback plane"

  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: "s3://cnpg-backups/postgres-shared"
      endpointURL: "http://minio-s3.minio.svc.cluster.local:9000"
      s3Credentials:
        accessKeyId:
          name: postgres-shared-minio
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: postgres-shared-minio
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
        jobs: 2

  affinity:
    podAntiAffinityType: preferred
    topologyKey: kubernetes.io/hostname
    tolerations:
      - key: node.kubernetes.io/not-ready
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 300
      - key: node.kubernetes.io/unreachable
        operator: Exists
        effect: NoExecute
        tolerationSeconds: 300
    nodeSelector:
      kubernetes.io/arch: amd64
