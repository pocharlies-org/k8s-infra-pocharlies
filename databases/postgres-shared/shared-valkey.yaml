# Shared Valkey HA for low-risk shared cache/state tenants.
#
# Scope guard:
# - Do not point ArgoCD, Harbor, or labels/Synapse here.
# - This instance is tuned as a small shared tier: AOF + bounded memory +
#   noeviction, so queue/session metadata is not silently evicted.
# - The Secret `shared-valkey-acl` is intentionally not stored in Git. It must
#   contain: users.acl, replication-password, sentinel-password,
#   sentinel-valkey-password.
apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-valkey-scripts
  namespace: databases
  labels:
    app: shared-valkey
    app.kubernetes.io/component: shared-valkey
data:
  start-valkey.sh: |
    #!/bin/sh
    set -eu

    HEADLESS="shared-valkey-headless.${POD_NAMESPACE}.svc.cluster.local"
    SENTINEL_SVC="shared-valkey-sentinel.${POD_NAMESPACE}.svc.cluster.local"
    MYFQDN="${POD_NAME}.${HEADLESS}"
    CLI=valkey-cli

    MASTER_IP=""
    for i in $(seq 1 10); do
      MASTER_IP=$($CLI -h "$SENTINEL_SVC" -p 26379 -a "$SENTINEL_PASSWORD" --no-auth-warning sentinel get-master-addr-by-name shared-cache-master 2>/dev/null | head -1 || true)
      [ -n "$MASTER_IP" ] && break
      sleep 2
    done

    COMMON="--port 6379 --dir /data --appendonly yes --appendfsync everysec --save '' --maxmemory 2gb --maxmemory-policy noeviction --aclfile /acl/users.acl --replica-announce-ip ${MYFQDN} --masteruser replication --masterauth ${REPLICATION_PASSWORD}"
    if [ -n "$MASTER_IP" ] && [ "$MASTER_IP" != "$MYFQDN" ]; then
      exec valkey-server $COMMON --replicaof "$MASTER_IP" 6379
    elif [ "$POD_NAME" = "shared-valkey-0" ]; then
      exec valkey-server $COMMON
    else
      exec valkey-server $COMMON --replicaof "shared-valkey-0.${HEADLESS}" 6379
    fi
  start-sentinel.sh: |
    #!/bin/sh
    set -eu

    HEADLESS="shared-valkey-headless.${POD_NAMESPACE}.svc.cluster.local"
    CONF=/data/sentinel.conf
    cat > "$CONF" <<EOF
    port 26379
    dir /data
    requirepass ${SENTINEL_PASSWORD}
    sentinel resolve-hostnames yes
    sentinel announce-hostnames yes
    sentinel monitor shared-cache-master shared-valkey-0.${HEADLESS} 6379 2
    sentinel auth-user shared-cache-master sentinel
    sentinel auth-pass shared-cache-master ${SENTINEL_VALKEY_PASSWORD}
    sentinel down-after-milliseconds shared-cache-master 5000
    sentinel failover-timeout shared-cache-master 10000
    sentinel parallel-syncs shared-cache-master 1
    EOF
    exec valkey-sentinel "$CONF"
---
apiVersion: v1
kind: Service
metadata:
  name: shared-valkey-headless
  namespace: databases
  labels:
    app: shared-valkey
    app.kubernetes.io/component: shared-valkey
    metrics.e-dani.com/scrape: "true"
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: shared-valkey
  ports:
    - { name: valkey, port: 6379, targetPort: 6379 }
    - { name: sentinel, port: 26379, targetPort: 26379 }
    - { name: metrics, port: 9121, targetPort: 9121 }
---
apiVersion: v1
kind: Service
metadata:
  name: shared-valkey-sentinel
  namespace: databases
  labels:
    app: shared-valkey
    app.kubernetes.io/component: shared-valkey
spec:
  selector:
    app: shared-valkey
  ports:
    - { name: sentinel, port: 26379, targetPort: 26379 }
---
apiVersion: v1
kind: Service
metadata:
  name: shared-valkey-master
  namespace: databases
  labels:
    app: shared-valkey
    app.kubernetes.io/component: shared-valkey
spec:
  selector:
    app: shared-valkey
    valkey-role: master
  ports:
    - { name: valkey, port: 6379, targetPort: 6379 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: shared-valkey
  namespace: databases
  labels:
    app: shared-valkey
    app.kubernetes.io/component: shared-valkey
spec:
  serviceName: shared-valkey-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: shared-valkey
  template:
    metadata:
      labels:
        app: shared-valkey
        app.kubernetes.io/component: shared-valkey
    spec:
      enableServiceLinks: false
      nodeSelector: { workload: core }
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector: { matchLabels: { app: shared-valkey } }
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          minDomains: 3
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          nodeAffinityPolicy: Honor
          nodeTaintsPolicy: Honor
          labelSelector: { matchLabels: { app: shared-valkey } }
      containers:
        - name: valkey
          image: docker.io/valkey/valkey@sha256:77643d152547b446fc15cbafaff22004545663fcd40c6b28038ad283837baa75
          command: ["/bin/sh", "/scripts/start-valkey.sh"]
          env:
            - { name: POD_NAME, valueFrom: { fieldRef: { fieldPath: metadata.name } } }
            - { name: POD_NAMESPACE, valueFrom: { fieldRef: { fieldPath: metadata.namespace } } }
            - name: REPLICATION_PASSWORD
              valueFrom: { secretKeyRef: { name: shared-valkey-acl, key: replication-password } }
            - name: SENTINEL_PASSWORD
              valueFrom: { secretKeyRef: { name: shared-valkey-acl, key: sentinel-password } }
            - name: SENTINEL_VALKEY_PASSWORD
              valueFrom: { secretKeyRef: { name: shared-valkey-acl, key: sentinel-valkey-password } }
          ports:
            - { name: valkey, containerPort: 6379 }
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: scripts, mountPath: /scripts }
            - { name: acl, mountPath: /acl, readOnly: true }
          livenessProbe:
            exec:
              command: ["sh", "-ec", "valkey-cli -p 6379 --user sentinel -a \"$SENTINEL_VALKEY_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            exec:
              command: ["sh", "-ec", "valkey-cli -p 6379 --user sentinel -a \"$SENTINEL_VALKEY_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 256Mi }
            limits: { memory: 2560Mi }
        - name: sentinel
          image: docker.io/valkey/valkey@sha256:77643d152547b446fc15cbafaff22004545663fcd40c6b28038ad283837baa75
          command: ["/bin/sh", "/scripts/start-sentinel.sh"]
          env:
            - { name: POD_NAME, valueFrom: { fieldRef: { fieldPath: metadata.name } } }
            - { name: POD_NAMESPACE, valueFrom: { fieldRef: { fieldPath: metadata.namespace } } }
            - name: SENTINEL_PASSWORD
              valueFrom: { secretKeyRef: { name: shared-valkey-acl, key: sentinel-password } }
            - name: SENTINEL_VALKEY_PASSWORD
              valueFrom: { secretKeyRef: { name: shared-valkey-acl, key: sentinel-valkey-password } }
          ports:
            - { name: sentinel, containerPort: 26379 }
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: scripts, mountPath: /scripts }
          livenessProbe:
            exec:
              command: ["sh", "-ec", "valkey-cli -p 26379 -a \"$SENTINEL_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits: { memory: 96Mi }
        - name: exporter
          image: docker.io/oliver006/redis_exporter@sha256:d98e6db8094f491b95791e9f776b0ba30a20aeacb90e18334935d5e51bf2e6a1
          args:
            - --redis.addr=redis://localhost:6379
            - --redis.user=sentinel
            - --redis.password=$(SENTINEL_VALKEY_PASSWORD)
            - --config-command=-
          env:
            - name: SENTINEL_VALKEY_PASSWORD
              valueFrom: { secretKeyRef: { name: shared-valkey-acl, key: sentinel-valkey-password } }
          ports:
            - { name: metrics, containerPort: 9121 }
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { memory: 64Mi }
      volumes:
        - name: scripts
          configMap: { name: shared-valkey-scripts, defaultMode: 0755 }
        - name: acl
          secret:
            secretName: shared-valkey-acl
            items:
              - { key: users.acl, path: users.acl }
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 2Gi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: shared-valkey
  namespace: databases
  labels:
    app: shared-valkey
    app.kubernetes.io/component: shared-valkey
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: shared-valkey
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: shared-valkey-master-labeler
  namespace: databases
  labels:
    app: shared-valkey-master-labeler
    app.kubernetes.io/component: shared-valkey
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shared-valkey-master-labeler
  namespace: databases
  labels:
    app: shared-valkey-master-labeler
    app.kubernetes.io/component: shared-valkey
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shared-valkey-master-labeler
  namespace: databases
  labels:
    app: shared-valkey-master-labeler
    app.kubernetes.io/component: shared-valkey
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: shared-valkey-master-labeler
subjects:
  - kind: ServiceAccount
    name: shared-valkey-master-labeler
    namespace: databases
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shared-valkey-master-labeler
  namespace: databases
  labels:
    app: shared-valkey-master-labeler
    app.kubernetes.io/component: shared-valkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shared-valkey-master-labeler
  template:
    metadata:
      labels:
        app: shared-valkey-master-labeler
        app.kubernetes.io/component: shared-valkey
    spec:
      serviceAccountName: shared-valkey-master-labeler
      enableServiceLinks: false
      nodeSelector: { workload: core }
      containers:
        - name: labeler
          image: docker.io/alpine/k8s@sha256:bb8e5be4a1ed2d24bf7f7ccab74b594849c6b59feab1b9c8c0f39554e69678c1
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -u
              PODS="shared-valkey-0 shared-valkey-1 shared-valkey-2"
              echo "shared-valkey-master-labeler started"
              while true; do
                for p in $PODS; do
                  role=$(kubectl -n databases exec "$p" -c valkey -- sh -c 'valkey-cli -p 6379 --user sentinel -a "$SENTINEL_VALKEY_PASSWORD" --no-auth-warning role' 2>/dev/null | head -1)
                  case "$role" in
                    master) kubectl -n databases label pod "$p" valkey-role=master --overwrite >/dev/null 2>&1 ;;
                    slave)  kubectl -n databases label pod "$p" valkey-role=replica --overwrite >/dev/null 2>&1 ;;
                    *) : ;;
                  esac
                done
                sleep 5
              done
          resources:
            requests: { cpu: 20m, memory: 48Mi }
            limits: { memory: 128Mi }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: shared-valkey-ingress
  namespace: databases
  labels:
    app: shared-valkey
    app.kubernetes.io/component: shared-valkey
spec:
  podSelector:
    matchLabels:
      app: shared-valkey
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: shared-valkey
      ports:
        - { protocol: TCP, port: 6379 }
        - { protocol: TCP, port: 26379 }
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: skirmshop
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: affiliate
      ports:
        - { protocol: TCP, port: 6379 }
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: skirmshop-brain-prod
      ports:
        - { protocol: TCP, port: 6379 }
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: skirmshop
          podSelector:
            matchLabels:
              app: firecrawl-api
      ports:
        - { protocol: TCP, port: 6379 }
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: skirmshop
          podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - skirmbooks-fiscal-validator
                  - skirmbooks-fiscal-validator-validation
                  - skirmbooks-fiscal-validator-analysis
      ports:
        - { protocol: TCP, port: 6379 }
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: control-nexus
          podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - dgx-dashboard-backend
                  # worker dedicado de colas AI Studio (dgx-infra
                  # k8s/control-nexus/dashboard-worker-deployment.yaml) — misma
                  # app, mismo Redis; sin esta entrada el worker recibe
                  # connection refused y las colas image/video/trellis no corren.
                  - dgx-dashboard-worker
                  # Telegram Studio bot (dgx-infra
                  # k8s/control-nexus/dgx-studio-bot-deployment.yaml) — misma red,
                  # mismo Redis de colas/estado (offset getUpdates, FSM, rate-limit);
                  # sin esta entrada el bot recibe connection refused a shared-valkey.
                  - dgx-studio-bot
                  # Private DGX Spark operations bot (dgx-infra
                  # k8s/control-nexus/op-dgx-spark-bot-deployment.yaml). It uses
                  # Valkey only for its Telegram poller lease, dedupe, rate limit
                  # and one-shot user-bound action confirmations.
                  - op-dgx-spark-bot
      ports:
        - { protocol: TCP, port: 6379 }
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: whatsapp-mcp
          podSelector:
            matchLabels:
              app: whatsapp-connector
      ports:
        - { protocol: TCP, port: 6379 }
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: whatsapp-mcp
          podSelector:
            matchLabels:
              app: whatsapp-connector-professional
      ports:
        - { protocol: TCP, port: 6379 }
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: whatsapp-mcp
          podSelector:
            matchLabels:
              app: mcp-sse
      ports:
        - { protocol: TCP, port: 6379 }
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: libreplay
          podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - libreplay-web
                  - libreplay-worker
                  - libreplay-db-seed
      ports:
        - { protocol: TCP, port: 6379 }
    # LiteLLM is admitted only to the Valkey data plane. Its current manifests
    # do not configure a Sentinel-aware client, so port 26379 stays closed.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: litellm
          podSelector:
            matchLabels:
              app: litellm
      ports:
        - { protocol: TCP, port: 6379 }
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: vmagent
      ports:
        - { protocol: TCP, port: 9121 }
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: shared-valkey
  namespace: databases
  labels:
    app: shared-valkey
    app.kubernetes.io/component: shared-valkey
spec:
  selector:
    matchLabels:
      metrics.e-dani.com/scrape: "true"
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: shared-valkey
  namespace: databases
  labels:
    app.kubernetes.io/part-of: shared-valkey
spec:
  groups:
    - name: shared-valkey.cache
      rules:
        - alert: SharedValkeyMetricsMissing
          expr: absent(redis_up{job="shared-valkey-headless"})
          for: 5m
          labels:
            severity: critical
            area: cache
            component: shared-valkey
          annotations:
            summary: "shared-valkey metrics are missing"
            description: "No redis_up series for shared-valkey for 5m. The exporter scrape is failing or the shared Valkey pods are down."
        - alert: SharedValkeyScrapeTargetsLow
          expr: count(redis_up{job="shared-valkey-headless"}) < 3
          for: 5m
          labels:
            severity: warning
            area: cache
            component: shared-valkey
          annotations:
            summary: "shared-valkey has fewer than 3 scrape targets"
            description: "VictoriaMetrics sees {{ $value }} shared-valkey exporter target(s); expected 3 pods."
        - alert: SharedValkeyExporterDown
          expr: redis_up{job="shared-valkey-headless"} == 0
          for: 2m
          labels:
            severity: critical
            area: cache
            component: shared-valkey
          annotations:
            summary: "shared-valkey exporter cannot reach Valkey"
            description: "Exporter target {{ $labels.pod }} reports redis_up=0 for 2m."
        - alert: SharedValkeyMasterCountInvalid
          expr: (count(redis_instance_info{job="shared-valkey-headless",role="master"}) or vector(0)) != 1
          for: 2m
          labels:
            severity: critical
            area: cache
            component: shared-valkey
          annotations:
            summary: "shared-valkey master count is invalid"
            description: "Expected exactly one shared-valkey master; current master count is {{ $value }}."
        - alert: SharedValkeyReplicaCountLow
          expr: (max(redis_connected_slaves{job="shared-valkey-headless"}) or vector(0)) < 2
          for: 5m
          labels:
            severity: critical
            area: cache
            component: shared-valkey
          annotations:
            summary: "shared-valkey master has fewer than two replicas"
            description: "The current shared-valkey master reports {{ $value }} connected replica(s); expected 2."
        - alert: SharedValkeyMemoryHigh
          expr: max(redis_memory_used_bytes{job="shared-valkey-headless"} / redis_memory_max_bytes{job="shared-valkey-headless"}) > 0.80
          for: 10m
          labels:
            severity: warning
            area: cache
            component: shared-valkey
          annotations:
            summary: "shared-valkey memory usage is above 80%"
            description: "shared-valkey memory is above 80% of maxmemory for 10m. With noeviction enabled, clients may start receiving write errors if it fills."
        - alert: SharedValkeyEvictions
          expr: sum(increase(redis_evicted_keys_total{job="shared-valkey-headless"}[10m])) > 0
          for: 0m
          labels:
            severity: warning
            area: cache
            component: shared-valkey
          annotations:
            summary: "shared-valkey is evicting keys"
            description: "shared-valkey evicted {{ $value }} key(s) in the last 10m. During affiliate soak this should stay at 0."
        - alert: SharedValkeyRejectedConnections
          expr: sum(increase(redis_rejected_connections_total{job="shared-valkey-headless"}[5m])) > 0
          for: 0m
          labels:
            severity: critical
            area: cache
            component: shared-valkey
          annotations:
            summary: "shared-valkey rejected connections"
            description: "shared-valkey rejected {{ $value }} connection(s) in the last 5m."
        - alert: SharedValkeyAofUnhealthy
          expr: |
            (min(redis_aof_last_bgrewrite_status{job="shared-valkey-headless"}) == 0)
            or
            (min(redis_aof_last_write_status{job="shared-valkey-headless"}) == 0)
          for: 5m
          labels:
            severity: critical
            area: cache
            component: shared-valkey
          annotations:
            summary: "shared-valkey AOF is unhealthy"
            description: "At least one shared-valkey pod reports a failing AOF rewrite or write status for 5m."
