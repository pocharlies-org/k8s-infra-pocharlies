# Bridge Service to the legacy RabbitMQ that still lives on sauvage as a docker
# container (`shared-rabbitmq`, bound to 100.109.183.9:5672 via Tailscale). The
# Synapse workflow fabric (engine, dispatcher, gateway, and all
# `synapse-adapter-*` services) is still running on sauvage under
# `systemctl --user` and consumes from that RabbitMQ — including the
# `synapse-adapter-messaging` Hermes worker that handles outbound
# Telegram / WhatsApp / email.
#
# Publishers that run inside k8s (e.g. the picker CronJob) used to point at the
# in-cluster `shared-rabbitmq.databases.svc.cluster.local`, which silently
# rebounds their messages with NO_ROUTE because none of the Synapse adapters
# are connected there. Pointing them at `synapse-rmq.databases.svc.cluster.local`
# (this Service) routes traffic to the sauvage RabbitMQ so they reach the
# adapters that actually deliver the messages.
#
# Drop this manifest when the Synapse fabric is migrated to the in-cluster
# RabbitMQ (no consumers will be left on sauvage at that point).
apiVersion: v1
kind: Service
metadata:
  name: synapse-rmq
  namespace: databases
  labels:
    app.kubernetes.io/part-of: shared-infrastructure
    app.kubernetes.io/component: synapse-rmq-bridge
  annotations:
    pocharlies.io/target: "shared-rabbitmq pods (in-cluster, /synapse cutover 2026-06-15)"
spec:
  type: ClusterIP
  clusterIP: None
  # 2026-06-15 cutover: synapse-rmq ahora es un ALIAS headless de los pods del broker
  # k8s (app=shared-rabbitmq); k8s autogestiona los endpoints. Antes era headless sin
  # selector + EndpointSlice manual -> 100.109.183.9 (docker shared-rabbitmq en sauvage).
  # El EndpointSlice manual se eliminó en este commit (selfHeal lo recrearía si no).
  selector:
    app: shared-rabbitmq
  ports:
    - name: amqp
      port: 5672
      protocol: TCP
      targetPort: 5672
    - name: management
      port: 15672
      protocol: TCP
      targetPort: 15672
