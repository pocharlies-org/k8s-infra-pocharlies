apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd-amd64
  namespace: buildkit
  labels:
    app: buildkitd
    arch: amd64
spec:
  replicas: 1
  # buildkitd holds a replicated Longhorn cache PVC (RWO) -> Recreate avoids
  # two pods racing the same cache during a rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: buildkitd
      arch: amd64
  template:
    metadata:
      labels:
        app: buildkitd
        arch: amd64
      annotations:
        # Disable Vault agent injection: the injector's MutatingWebhook resets
        # allowPrivilegeEscalation to false on ALL containers, breaking rootlesskit.
        vault.hashicorp.com/agent-inject: "false"
    spec:
      # The production amd64 builder is part of the OpenClaw release path. Keep
      # both compute and cache on the three OVH KS5 nodes; it must not depend on
      # the home/dev ubuntu node.
      nodeSelector:
        kubernetes.io/arch: amd64
        node-pool: ks5-nvme
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      automountServiceAccountToken: false
      # Pod-level seccomp Unconfined is required for rootlesskit user-namespace
      # setup. The container-level override alone is insufficient because k3s/runc
      # applies the seccomp profile before the container securityContext is merged.
      securityContext:
        # Fresh CSI filesystems are owned by root. Grant the rootless BuildKit
        # process group access to the Longhorn cache without a privileged
        # chown init container or a node-specific preparation step.
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: Unconfined
      containers:
        - name: buildkitd
          image: docker.io/moby/buildkit:v0.31.0-rootless@sha256:e335bfb48eec12110318aced51f75161f01e765dd13e6041c0f4600b7c93507f
          args:
            - --addr
            - unix:///run/user/1000/buildkit/buildkitd.sock
            - --addr
            - tcp://0.0.0.0:1234
            - --oci-worker-no-process-sandbox
            # Keep the disposable cache bounded on the 25Gi PVC. Values are
            # reserved space, desired free space and maximum used space (MiB).
            - --oci-worker-gc
            - --oci-worker-gc-keepstorage
            - 8192,8192,12288
          readinessProbe:
            exec:
              command: ["buildctl", "debug", "workers"]
            initialDelaySeconds: 5
            periodSeconds: 30
          livenessProbe:
            exec:
              command: ["buildctl", "debug", "workers"]
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            # Rootless buildkit needs SETUID+SETGID so newuidmap/newgidmap can
            # configure the user-namespace UID/GID map. Not privileged; Kyverno
            # only blocks privileged:true, not specific Linux capabilities.
            # allowPrivilegeEscalation=true is required: with APE=false the kernel
            # strips the ambient+inheritable caps across exec(), which prevents
            # newuidmap from using its setuid bit even if SETUID is in add[].
            seccompProfile:
              type: Unconfined
            # Structured AppArmor replaced the deprecated beta annotation in
            # Kubernetes 1.30 and remains supported through the 1.35 target.
            appArmorProfile:
              type: Unconfined
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - SETUID
                - SETGID
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 8Gi
          ports:
            - name: buildkit
              containerPort: 1234
          volumeMounts:
            - name: cache
              mountPath: /home/user/.local/share/buildkit
            - name: harbor-push
              mountPath: /home/user/.docker
              readOnly: true
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: buildkitd-amd64-cache-longhorn
        - name: harbor-push
          secret:
            secretName: harbor-push
            items:
              - key: .dockerconfigjson
                path: config.json
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: buildkitd-amd64-cache-longhorn
  namespace: buildkit
  labels:
    app: buildkitd
    arch: amd64
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn-prod-nvme
  resources:
    requests:
      # The cache is disposable, but PVC requests cannot be shrunk. Keep the
      # GitOps request aligned with the already-bound 25Gi volume so Argo can
      # reconcile forward-only without attempting an invalid resize.
      storage: 25Gi
---
apiVersion: v1
kind: Service
metadata:
  name: buildkitd-amd64
  namespace: buildkit
  labels:
    app: buildkitd
    arch: amd64
spec:
  type: ClusterIP
  selector:
    app: buildkitd
    arch: amd64
  ports:
    - name: buildkit
      port: 1234
      targetPort: 1234
      protocol: TCP
