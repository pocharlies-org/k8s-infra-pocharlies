name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["**"]
    tags-ignore: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standard:
    uses: pocharlies-org/k8s-gitops-pocharlies/.github/workflows/reusable-ci.yml@main
    with:
      runner: arc-k8s
      run_node: false
      run_docker_build: false
      kustomize_paths: "."
    secrets: inherit

  keycloak-agentgateway-role-contract:
    runs-on: arc-k8s
    steps:
      - uses: actions/checkout@v4
      - name: Validate Keycloak role reconciler contract
        run: |
          sh -n platform/keycloak-next/scripts/agentgateway-write-role.sh
          sh -n platform/keycloak-next/scripts/openclaw-readonly-clients.sh
          sh -n platform/keycloak-next/scripts/agentgateway-domain-roles.sh
          python3 -m unittest \
            tests/test_keycloak_agentgateway_role_contract.py \
            tests/test_openclaw_readonly_identity_contract.py \
            tests/test_keycloak_agentgateway_domain_roles_contract.py

  velero-operability-contract:
    runs-on: arc-k8s
    steps:
      - uses: actions/checkout@v4
      - name: Validate Velero operability contract
        run: python3 -m unittest tests/test_velero_operability_contract.py

  longhorn-systembackup-contract:
    runs-on: arc-k8s
    steps:
      - uses: actions/checkout@v4
      - name: Validate fail-closed Longhorn SystemBackup contract
        run: python3 -m unittest tests/test_longhorn_systembackup_contract.py

  synapse-sre-postgres-role-contract:
    runs-on: arc-k8s
    steps:
      - uses: actions/checkout@v4
      - name: Validate least-privilege SRE database roles
        run: python3 -m unittest tests/test_synapse_sre_postgres_roles.py

  shared-valkey-litellm-ha-contract:
    runs-on: arc-k8s
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Install manifest test dependencies
        run: |
          test "$(uname -m)" = x86_64
          python -m pip install --disable-pip-version-check \
            --require-hashes --only-binary=PyYAML \
            -r tests/requirements-shared-valkey-ha.lock
      - name: Install pinned kubectl
        env:
          KUBECTL_VERSION: v1.36.0
          KUBECTL_SHA256: 123d8c8844f46b1244c547fffb3c17180c0c26dac9890589fe7e67763298748e
        run: |
          test "$(uname -m)" = x86_64
          install_dir="${RUNNER_TEMP}/kubectl-bin"
          mkdir -p "${install_dir}"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --silent --show-error \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" \
            --output "${install_dir}/kubectl"
          printf '%s  %s\n' "${KUBECTL_SHA256}" "${install_dir}/kubectl" \
            | sha256sum --check --strict -
          chmod 0755 "${install_dir}/kubectl"
          printf '%s\n' "${install_dir}" >> "${GITHUB_PATH}"
      - name: Validate shared Valkey HA and LiteLLM admission contract
        run: |
          kubectl version --client
          python -m unittest tests/test_shared_valkey_litellm_ha_contract.py
